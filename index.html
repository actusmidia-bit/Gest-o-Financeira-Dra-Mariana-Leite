<html lang="pt-BR">
<head>

<style>
:root{--rose:#e11d48;--rose-light:#fecdd3;--rose-dark:#9f1239;}
*{box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:#fdf2f4;}
.card{background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(225,29,72,.08);padding:1.25rem;}
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem 1.1rem;border-radius:10px;font-weight:600;font-size:.875rem;cursor:pointer;transition:all .15s;border:none;}
.btn-primary{background:var(--rose);color:#fff;} .btn-primary:hover{background:var(--rose-dark);}
.btn-secondary{background:#f3f4f6;color:#374151;} .btn-secondary:hover{background:#e5e7eb;}
.btn-ghost{background:transparent;color:var(--rose);border:1.5px solid var(--rose);} .btn-ghost:hover{background:#fff1f2;}
.btn-sm{padding:.3rem .75rem;font-size:.8rem;}
.btn-danger{background:#fee2e2;color:#dc2626;} .btn-danger:hover{background:#fecaca;}
.inp{width:100%;padding:.5rem .75rem;border:1.5px solid #e5e7eb;border-radius:10px;font-size:.9rem;outline:none;transition:border .15s;}
.inp:focus{border-color:var(--rose);}
.inp-sm{padding:.35rem .6rem;font-size:.82rem;}
.tag{display:inline-block;padding:.15rem .6rem;border-radius:6px;font-size:.75rem;font-weight:600;}
.tag-green{background:#d1fae5;color:#065f46;} .tag-red{background:#fee2e2;color:#991b1b;}
.tag-yellow{background:#fef3c7;color:#92400e;} .tag-blue{background:#dbeafe;color:#1e40af;}
.tag-purple{background:#ede9fe;color:#5b21b6;}
.nav-item{display:flex;align-items:center;gap:.5rem;padding:.55rem .9rem;border-radius:10px;cursor:pointer;font-size:.875rem;font-weight:500;color:#6b7280;transition:all .15s;white-space:nowrap;}
.nav-item:hover{background:#fff1f2;color:var(--rose);}
.nav-item.active{background:#fff1f2;color:var(--rose);font-weight:700;}
.tooltip{position:relative;display:inline-block;cursor:help;}
.tooltip .tip{visibility:hidden;background:#1f2937;color:#fff;font-size:.75rem;border-radius:8px;padding:.4rem .7rem;position:absolute;z-index:50;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);white-space:pre-line;min-width:200px;max-width:280px;line-height:1.4;pointer-events:none;opacity:0;transition:opacity .15s;}
.tooltip:hover .tip{visibility:visible;opacity:1;}
.progress-bar{height:8px;background:#f3f4f6;border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;border-radius:4px;background:var(--rose);transition:width .4s;}
.table-header{background:#fdf2f4;font-size:.78rem;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;}
.kpi-card{background:#fff;border-radius:14px;padding:1rem 1.2rem;box-shadow:0 2px 8px rgba(225,29,72,.07);border-left:4px solid var(--rose);}
.tab-btn{padding:.4rem 1rem;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;border:none;transition:all .15s;}
.tab-btn.active{background:var(--rose);color:#fff;}
.tab-btn:not(.active){background:#f3f4f6;color:#6b7280;}
.tab-btn:not(.active):hover{background:#e5e7eb;}
@media print{
  nav,#sidebar,.btn,.no-print,#toastContainer{display:none!important;}
  body{background:#fff;}
  .card{box-shadow:none;border:1px solid #e5e7eb;break-inside:avoid;}
}
@media(max-width:640px){
  #sidebar{position:fixed;left:-180px;top:0;bottom:0;z-index:40;transition:left .2s;width:180px;}
  #sidebar.open{left:0;box-shadow:4px 0 20px rgba(0,0,0,.15);}
  #overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:39;}
  #overlay.show{display:block;}
}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;padding:.6rem 1.1rem;border-radius:12px;font-size:.85rem;font-weight:600;color:#fff;z-index:100;animation:slideUp .2s ease;box-shadow:0 4px 14px rgba(0,0,0,.2);}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.dre-row{display:flex;justify-content:space-between;padding:.4rem 0;border-bottom:1px solid #f3f4f6;font-size:.9rem;}
.dre-total{display:flex;justify-content:space-between;padding:.5rem .75rem;border-radius:8px;font-weight:700;font-size:.95rem;margin:.25rem 0;}

<script>
const SB_URL = 'https://slbxxprtdsjrwxpeygog.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNsYnh4cHJ0ZHNqcnd4cGV5Z29nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMjMwMjYsImV4cCI6MjA5Nzg5OTAyNn0.vomdmn90--Fe3FtnnO5FzRkZ4XBis8zMKQulZ1XqdzM';
const sb = supabase.createClient(SB_URL, SB_KEY);

const S = { user:null, insumos:[], fixos:[], procs:[], regs:[], cfg:{},
  recebimentos:[], despesas:[], compras:[], metas:[] };
let currentPage = 'visaogeral';

// ── Utils ─────────────────────────────────────
function showToast(msg, type='success') {
  const c=document.getElementById('toastContainer'); if(!c) return;
  const t=document.createElement('div'); t.className='toast';
  t.style.background=type==='success'?'#10b981':type==='error'?'#ef4444':'#f59e0b';
  t.textContent=msg; c.appendChild(t); setTimeout(()=>t.remove(),3000);
}
function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); }
function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }
const fmtBRL = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);
const fmtPct = v => `${(+v||0).toFixed(1)}%`;
const uid = () => crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36)+Math.random().toString(36).slice(2,9);
const today = () => new Date().toISOString().slice(0,10);
const mesAtual = () => new Date().toISOString().slice(0,7);
const nomeMes = m => { try{ return new Date(m+'-02').toLocaleDateString('pt-BR',{month:'long',year:'numeric'}); }catch(e){ return m; } };
function tip(t,l='ℹ'){ return `<span class="tooltip text-rose-400 text-xs ml-1">${l}<span class="tip">${t}</span></span>`; }
function escHtml(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function setSyncStatus(msg,color='text-gray-400'){ const el=document.getElementById('syncStatus'); if(el){el.textContent=msg;el.className='text-xs '+color;} }

// ── LocalStorage ──────────────────────────────
function lsKey(t){ return `gf_${S.user.id.slice(0,8)}_${t}`; }
function lsSave(t,d){ try{ localStorage.setItem(lsKey(t),JSON.stringify(d)); }catch(e){} }
function lsLoad(t){ try{ return JSON.parse(localStorage.getItem(lsKey(t)))||[]; }catch(e){ return []; } }
function lsLoadObj(t,def={}){ try{ return JSON.parse(localStorage.getItem(lsKey(t)))||def; }catch(e){ return def; } }

// ── Supabase ──────────────────────────────────
async function cloudUpsert(table,obj){ try{ const {error}=await sb.from(table).upsert({...obj,user_id:S.user.id}); if(error) console.warn(table,error.message); }catch(e){} }
async function cloudDelete(table,id){ try{ await sb.from(table).delete().eq('id',id).eq('user_id',S.user.id); }catch(e){} }

// ── Auth ──────────────────────────────────────
window.auth = {
  async login() {
    const emailEl=document.getElementById('loginEmail');
    const passEl=document.getElementById('loginPass');
    const err=document.getElementById('loginErr');
    const btn=document.querySelector('#loginPage .btn-primary');
    const email=(emailEl?.value||'').trim();
    const pass=passEl?.value||'';
    if(err) err.classList.add('hidden');
    if(!email||!pass){

      return;
    }
    if(btn){ btn.textContent='Entrando…'; btn.disabled=true; }
    let result;
    try{ result=await sb.auth.signInWithPassword({email,password:pass}); }
    catch(e){ result={error:e}; }
    if(btn){ btn.textContent='Entrar'; btn.disabled=false; }
    const {data,error}=result||{};
    if(error||!data?.user){
      const msg=error?.message||'Erro ao entrar. Tente novamente.';
      if(err){ err.textContent=msg.includes('credentials')||msg.includes('password')?'E-mail ou senha incorretos.':msg; err.classList.remove('hidden'); }
      return;

    S.user=data.user;
    loadLocalStorage();
    showApp();
    loadCloud();
  },
  async logout(){
    await sb.auth.signOut(); S.user=null;
    document.getElementById('appShell').classList.add('hidden');
    document.getElementById('loginPage').classList.remove('hidden');
  }
};

sb.auth.onAuthStateChange((event,session)=>{
  if(event==='SIGNED_OUT'){ S.user=null; document.getElementById('appShell').classList.add('hidden'); document.getElementById('loginPage').classList.remove('hidden'); }
  if(event==='TOKEN_REFRESHED'&&session) S.user=session.user;
});

// ── Load all data ─────────────────────────────
function loadLocalStorage() {
  S.insumos=lsLoad('insumos'); S.fixos=lsLoad('fixos'); S.procs=lsLoad('procs');
  S.regs=lsLoad('regs'); S.cfg=lsLoadObj('cfg',{horas:139.41,imposto:6,cartao:3.5,lucro:30,pro_labore:0});
  S.recebimentos=lsLoad('recebimentos'); S.despesas=lsLoad('despesas');
  S.compras=lsLoad('compras'); S.metas=lsLoad('metas');
}

async function cloudLoad(table){
  try{
    const t=new Promise(r=>setTimeout(()=>r(null),5000));
    const q=sb.from(table).select('*').eq('user_id',S.user.id);
    const res=await Promise.race([q,t]);
    if(!res||res.error) return null;
    return res.data;
  }catch(e){ return null; }
}

async function loadCloud() {
  setSyncStatus('Sincronizando…','text-yellow-500');
  const tables=[['insumos','insumos'],['custos_fixos','fixos'],['procedimentos','procs'],
    ['registros','regs'],['recebimentos','recebimentos'],
    ['despesas_variaveis','despesas'],['compras_estoque','compras'],['metas_mensais','metas']];
  try{
    const results=await Promise.all(tables.map(([tbl])=>cloudLoad(tbl)));
    results.forEach((d,i)=>{ if(d){ S[tables[i][1]]=d; lsSave(tables[i][1],d); } });
  }catch(e){}
  try{
    const t=new Promise(r=>setTimeout(()=>r(null),5000));
    const q=sb.from('config_clinica').select('*').eq('user_id',S.user.id).maybeSingle();
    const cfgR=await Promise.race([q,t]);
    if(cfgR?.data){ S.cfg={...S.cfg,...cfgR.data}; lsSave('cfg',S.cfg); }
  }catch(e){}
  setSyncStatus('✓ Sincronizado','text-green-500');
  setTimeout(()=>setSyncStatus(''),3000);
  // re-render current page with fresh data
  if(currentPage) goTo(currentPage);
}

async function loadAll() { loadLocalStorage(); await loadCloud(); }

function showApp(){
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('appShell').classList.remove('hidden');
  goTo('visaogeral');
}

function goTo(page){
  currentPage=page; closeSidebar();
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const nav=document.getElementById('nav-'+page); if(nav) nav.classList.add('active');
  const pages={visaogeral:renderVisaoGeral,protocolos:renderProtocolos,financeiro:renderFinanceiro,configurar:renderConfigurar};
  if(pages[page]) pages[page]();
}

// ── Calculations ──────────────────────────────
function calcCustoMinuto(){
  const totalFixo=S.fixos.reduce((s,f)=>s+(+f.valor||0),0);
  const min=(S.cfg.horas||139.41)*60;
  return min>0?totalFixo/min:0;
}

function calcDRE(mes){
  const regs=S.regs.filter(r=>r.data&&r.data.startsWith(mes));
  const receita=regs.reduce((s,r)=>s+(+r.preco||0),0);
  const custoInsumos=regs.reduce((s,r)=>s+(+r.custo_insumos||0),0);
  const custoTempo=regs.reduce((s,r)=>s+(+r.custo_tempo||0),0);
  const lucroBruto=receita-custoInsumos-custoTempo;
  const totalFixo=S.fixos.reduce((s,f)=>s+(+f.valor||0),0);
  const totalDespesas=S.despesas.filter(d=>d.data&&d.data.startsWith(mes)).reduce((s,d)=>s+(+d.valor||0),0);
  const impostos=receita*(+(S.cfg.imposto||6)/100);
  const resultado=lucroBruto-totalFixo-totalDespesas-impostos;
  const proLabore=+(S.cfg.pro_labore||0);
  const sobra=resultado-proLabore;
  const margem=receita>0?(resultado/receita)*100:0;
  return {receita,custoInsumos,custoTempo,lucroBruto,totalFixo,totalDespesas,impostos,resultado,proLabore,sobra,margem,atendimentos:regs.length};
}

function calcPreco(custoInsumos,minutos){
  const cm=calcCustoMinuto();
  const custoTempo=cm*minutos;
  const custoTotal=custoInsumos+custoTempo;
  const pI=+(S.cfg.imposto||6),pC=+(S.cfg.cartao||3.5),pL=+(S.cfg.lucro||30);
  const divisor=1-(pI+pC+pL)/100;
  const preco=divisor>0?custoTotal/divisor:custoTotal*2;
  return {custoInsumos,custoTempo,custoTotal,preco,pctImposto:pI,pctCartao:pC,pctLucro:pL,
    vlrImposto:preco*(pI/100),vlrCartao:preco*(pC/100),vlrLucro:preco*(pL/100)};
}

// ══════════════════ VISÃO GERAL ══════════════════
function renderVisaoGeral(){
  const mes=mesAtual();
  const dre=calcDRE(mes);
  const meta=S.metas.find(m=>m.mes===mes)||{faturamento:0,atendimentos:0};
  const pctF=meta.faturamento>0?Math.min((dre.receita/meta.faturamento)*100,100):0;
  const pctA=meta.atendimentos>0?Math.min((dre.atendimentos/meta.atendimentos)*100,100):0;
  const mesAnt=(()=>{ const d=new Date(mes+'-02'); d.setMonth(d.getMonth()-1); return d.toISOString().slice(0,7); })();
  const dreAnt=calcDRE(mesAnt);
  const diffRec=dreAnt.receita>0?((dre.receita-dreAnt.receita)/dreAnt.receita)*100:null;
  const diffRes=dreAnt.resultado!==0?((dre.resultado-dreAnt.resultado)/Math.abs(dreAnt.resultado))*100:null;
  const ticketMedio=dre.atendimentos>0?dre.receita/dre.atendimentos:0;
  const totalCustos=dre.totalFixo+dre.totalDespesas+dre.impostos;
  const breakEven=ticketMedio>0?Math.ceil(totalCustos/ticketMedio):0;
  const faltamBE=Math.max(0,breakEven-dre.atendimentos);
  const estoqueAlerta=S.insumos.filter(i=>(+i.estoque||0)<=(+i.estoque_min||0)&&(+i.estoque_min||0)>0);
  const hoje=today();
  const diasMes=new Date(new Date().getFullYear(),new Date().getMonth()+1,0).getDate();
  const diaHoje=new Date().getDate();
  // próximos vencimentos (custos fixos com vencimento_dia nos próximos 10 dias)
  const vencProx=S.fixos.filter(f=>f.vencimento_dia).map(f=>{
    const dia=+f.vencimento_dia;
    let data; const d=new Date(); d.setDate(dia);
    if(dia<diaHoje){ d.setMonth(d.getMonth()+1); }
    data=d.toISOString().slice(0,10);
    const diff=Math.ceil((d-new Date(hoje))/(1000*60*60*24));
    return {...f,data_venc:data,dias_para_vencer:diff};
  }).filter(f=>f.dias_para_vencer<=10).sort((a,b)=>a.dias_para_vencer-b.dias_para_vencer);
  // a receber nos próximos 30 dias
  const d30=new Date(); d30.setDate(d30.getDate()+30);
  const aReceber30=S.recebimentos.filter(r=>r.status==='pendente'&&r.data_prevista>=hoje&&r.data_prevista<=d30.toISOString().slice(0,10));
  const totalAReceber30=aReceber30.reduce((s,r)=>s+(+r.valor||0),0);
  const recebVencidos=S.recebimentos.filter(r=>r.status==='pendente'&&r.data_prevista<hoje);

  document.getElementById('mainContent').innerHTML=`
  <div class="space-y-5">
    <div class="flex items-center justify-between flex-wrap gap-2">
      <div><h2 class="text-xl font-bold text-gray-800">📊 Visão Geral</h2>
        <p class="text-sm text-gray-500">${nomeMes(mes)}</p></div>
      <button onclick="window.print()" class="btn btn-ghost btn-sm no-print">🖨 PDF</button>
    </div>

    <!-- KPIs principais -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
      <div class="kpi-card">
        <div class="text-xs text-gray-500 font-medium">FATURAMENTO BRUTO</div>
        <div class="text-2xl font-bold text-gray-800 mt-1">${fmtBRL(dre.receita)}</div>
        ${diffRec!==null?`<div class="text-xs mt-1 ${diffRec>=0?'text-green-600':'text-red-500'}">${diffRec>=0?'▲':'▼'} ${Math.abs(diffRec).toFixed(1)}% vs mês anterior</div>`:'<div class="text-xs text-gray-400 mt-1">Primeiro mês</div>'}
        ${meta.faturamento>0?`<div class="mt-2"><div class="progress-bar"><div class="progress-fill" style="width:${pctF}%;background:${pctF>=100?'#10b981':'#e11d48'}"></div></div><div class="text-xs text-right mt-1 ${pctF>=100?'text-green-600':'text-gray-500'}">${pctF.toFixed(0)}% da meta</div></div>`:''}
      </div>
      <div class="kpi-card" style="border-left-color:${dre.resultado>=0?'#10b981':'#ef4444'}">
        <div class="text-xs text-gray-500 font-medium">RESULTADO OPERACIONAL</div>
        <div class="text-2xl font-bold ${dre.resultado>=0?'text-green-700':'text-red-600'} mt-1">${fmtBRL(dre.resultado)}</div>
        <div class="text-xs text-gray-500 mt-1">Margem: ${fmtPct(dre.margem)}</div>
        ${dre.proLabore>0?`<div class="text-xs text-purple-600 mt-1">Pró-labore: ${fmtBRL(dre.proLabore)} → Sobra: ${fmtBRL(dre.sobra)}</div>`:''}
      </div>
      <div class="kpi-card" style="border-left-color:#6366f1">
        <div class="text-xs text-gray-500 font-medium">ATENDIMENTOS</div>
        <div class="text-2xl font-bold text-indigo-700 mt-1">${dre.atendimentos}</div>
        <div class="text-xs text-gray-500 mt-1">Ticket médio: ${fmtBRL(ticketMedio)}</div>
        ${meta.atendimentos>0?`<div class="mt-2"><div class="progress-bar"><div class="progress-fill" style="width:${pctA}%;background:${pctA>=100?'#10b981':'#6366f1'}"></div></div><div class="text-xs text-right mt-1 ${pctA>=100?'text-green-600':'text-gray-500'}">${pctA.toFixed(0)}% da meta</div></div>`:''}
      </div>
    </div>

    <!-- Alertas e previsão -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      <!-- Break-even -->
      <div class="card">
        <div class="text-sm font-semibold text-gray-700 mb-2">⚖️ Break-even do Mês</div>

  ['procedimentos','atendimentos'].forEach(t=>{ const b=document.getElementById('ptab-'+t); if(b) b.className='tab-btn'+(t===tab?' active':''); });

function renderListaProcs(){
  const el=document.getElementById('listaProcs'); if(!el) return;
  if(!S.procs.length){ el.innerHTML='<div class="text-center text-gray-400 py-8">Nenhum protocolo cadastrado</div>'; return; }
  const procsOrdenados=[...S.procs].sort((a,b)=>{
    const calcA=calcPreco(a.ficha?.reduce((s,f)=>{ const ins=S.insumos.find(i=>i.id===f.insumo_id); return s+(ins?(+ins.custo||0)*(+f.qtd||0):0); },0)||0,+a.tempo||0);
    const calcB=calcPreco(b.ficha?.reduce((s,f)=>{ const ins=S.insumos.find(i=>i.id===f.insumo_id); return s+(ins?(+ins.custo||0)*(+f.qtd||0):0); },0)||0,+b.tempo||0);
    return ((+b.preco||0)-calcB.custoTotal)-((+a.preco||0)-calcA.custoTotal);
  });
  // group by categoria
  const cats=[...new Set(procsOrdenados.map(p=>p.categoria||'Geral'))];
  el.innerHTML=cats.map(cat=>{
    const procs=procsOrdenados.filter(p=>(p.categoria||'Geral')===cat);

      <div class="text-xs font-bold text-rose-600 uppercase tracking-wide mb-2">${escHtml(cat)}</div>
      <div class="space-y-3">${procs.map((p,idx)=>{
        const ficha=Array.isArray(p.ficha)?p.ficha:[];
        const custoIns=ficha.reduce((s,f)=>{ const ins=S.insumos.find(i=>i.id===f.insumo_id); return s+(ins?(+ins.custo||0)*(+f.qtd||0):0); },0);
        const calc=calcPreco(custoIns,+p.tempo||0);
        const preco=+p.preco||0; const diff=preco-calc.preco;
        return `<div class="card">
          <div class="flex items-start justify-between gap-3">
            <div class="flex-1">
              <div class="font-semibold text-gray-800">${idx===0?'🥇':idx===1?'🥈':idx===2?'🥉':''} ${escHtml(p.nome)}</div>
              <div class="text-xs text-gray-500">${p.tempo||0} min</div>
            </div>
            <div class="text-right flex-shrink-0">
              <div class="font-bold text-gray-800">${fmtBRL(preco)}</div>
              <div class="text-xs ${diff<0?'text-red-500':'text-green-600'}">${diff<0?'⚠':'✓'} sugerido ${fmtBRL(calc.preco)}</div>
            </div>
            <div class="flex gap-1 no-print">
              <button onclick="abrirModalProc('${p.id}')" class="btn btn-sm btn-secondary">✏</button>
              <button onclick="deletarProc('${p.id}')" class="btn btn-sm btn-danger">🗑</button>
            </div>
          </div>
          <div class="mt-3 bg-gray-50 rounded-xl p-3 grid grid-cols-2 gap-x-4 gap-y-1 text-xs">
            <div class="flex justify-between"><span class="text-gray-500">Custo Insumos</span><span>${fmtBRL(calc.custoInsumos)}</span></div>
            <div class="flex justify-between"><span class="text-gray-500">Custo Tempo</span><span>${fmtBRL(calc.custoTempo)}</span></div>
            <div class="flex justify-between"><span class="text-gray-500">Impostos (${fmtPct(calc.pctImposto)})</span><span>${fmtBRL(calc.vlrImposto)}</span></div>
            <div class="flex justify-between"><span class="text-gray-500">Cartão (${fmtPct(calc.pctCartao)})</span><span>${fmtBRL(calc.vlrCartao)}</span></div>
            <div class="col-span-2 border-t pt-1 flex justify-between font-semibold text-green-700">
              <span>Lucro (${fmtPct(calc.pctLucro)})</span><span>${fmtBRL(calc.vlrLucro)}</span>
            </div>
            <div class="col-span-2 border-t pt-1 flex justify-between font-bold text-rose-700">
              <span>💡 Preço Sugerido</span><span>${fmtBRL(calc.preco)}</span>
            </div>
          </div>
        </div>`;
      }).join('')}</div>
    </div>`;
  }).join('');
}

function fecharModalProc(){ document.getElementById('modalProc').classList.add('hidden'); }
function renderFichaLista(){

    </div>`;
}
async function salvarProc(){
  const nome=document.getElementById('fp_nome').value.trim();
  if(!nome) return showToast('Informe o nome','error');
  const id=editingProcId||uid();
  const obj={id,nome,categoria:document.getElementById('fp_cat').value||'Outros',
    tempo:+(document.getElementById('fp_tempo').value)||0,
    preco:+(document.getElementById('fp_preco').value)||0,
    ficha:fichaTemp.filter(f=>f.insumo_id)};
  S.procs=S.procs.filter(p=>p.id!==id); S.procs.push(obj);
  lsSave('procs',S.procs); await cloudUpsert('procedimentos',obj);
  fecharModalProc(); renderTabProcedimentos(document.getElementById('protoContent')); showToast('Protocolo salvo ✓');
}
async function deletarProc(id){
  if(!confirm('Excluir protocolo?')) return;
  S.procs=S.procs.filter(p=>p.id!==id); lsSave('procs',S.procs);
  await cloudDelete('procedimentos',id); renderListaProcs(); showToast('Protocolo excluído');
}

function fecharModalAtend(){ document.getElementById('modalAtend').classList.add('hidden'); }
function editarAtend(id){
  const r=S.regs.find(x=>x.id===id); if(!r) return;
  abrirModalAtend();
  setTimeout(()=>{
    document.getElementById('fa_data').value=r.data||'';
    const pr=document.getElementById('fa_proc'); if(pr){ pr.value=r.proc_id||''; preencherAtendProc(); }
    document.getElementById('fa_preco').value=r.preco||'';
    const pg=document.getElementById('fa_pag'); if(pg) pg.value=r.pagamento||'Dinheiro';
    document.getElementById('modalAtend').dataset.editId=id;
  },50);
}
async function salvarAtend(){
  const data=document.getElementById('fa_data').value;
  const procId=document.getElementById('fa_proc').value;
  const preco=+document.getElementById('fa_preco').value||0;
  const pagamento=document.getElementById('fa_pag').value;
  if(!data||!procId) return showToast('Informe data e procedimento','error');
  const proc=S.procs.find(p=>p.id===procId);
  const ficha=proc&&Array.isArray(proc.ficha)?proc.ficha:[];
  const custoInsumos=ficha.reduce((s,f)=>{ const ins=S.insumos.find(i=>i.id===f.insumo_id); return s+(ins?(+ins.custo||0)*(+f.qtd||0):0); },0);
  const cm=calcCustoMinuto(); const custoTempo=cm*(+(proc&&proc.tempo)||0);
  const parcelas=parseInt((pagamento.match(/(\d+)x/)||[0,1])[1])||1;
  const editId=document.getElementById('modalAtend').dataset.editId||'';
  if(editId){ S.regs=S.regs.filter(r=>r.id!==editId); S.recebimentos=S.recebimentos.filter(r=>r.reg_id!==editId); await cloudDelete('registros',editId); }
  document.getElementById('modalAtend').dataset.editId='';
  const id=editId||uid();
  const obj={id,data,proc_id:procId,proc_nome:proc?.nome||'',paciente_id:null,paciente_nome:'',
    preco,pagamento,parcelas,custo_insumos:custoInsumos,custo_tempo:custoTempo};
  // validar estoque
  const alertasEstoque=[];
  for(const f of ficha){ const ins=S.insumos.find(i=>i.id===f.insumo_id); if(ins&&(+ins.estoque||0)<(+f.qtd||0)) alertasEstoque.push(`${ins.nome}: tem ${ins.estoque} ${ins.unidade||'un'}, precisa ${f.qtd}`); }
  if(alertasEstoque.length>0&&!confirm(`⚠️ Estoque insuficiente:\n${alertasEstoque.join('\n')}\n\nRegistrar mesmo assim?`)) return;
  for(const f of ficha){ const ins=S.insumos.find(i=>i.id===f.insumo_id); if(ins){ ins.estoque=Math.max(0,(+ins.estoque||0)-(+f.qtd||0)); S.insumos=S.insumos.map(i=>i.id===ins.id?ins:i); await cloudUpsert('insumos',ins); } }
  lsSave('insumos',S.insumos);
  S.regs.push(obj); lsSave('regs',S.regs); await cloudUpsert('registros',obj);
  const valorParcela=preco/parcelas;
  for(let p=1;p<=parcelas;p++){
    const dp=new Date(data); dp.setMonth(dp.getMonth()+(p-1));
    const rec={id:uid(),reg_id:id,descricao:`${proc?.nome||'Atend.'}${p>1?` (${p}/${parcelas})`:''}`,
      data_prevista:dp.toISOString().slice(0,10),data_recebido:parcelas===1?data:null,
      valor:valorParcela,status:parcelas===1?'recebido':'pendente',parcela:p,total_parcelas:parcelas};
    S.recebimentos.push(rec); await cloudUpsert('recebimentos',rec);
  }
  lsSave('recebimentos',S.recebimentos);
  fecharModalAtend(); renderListaAtend(); showToast('Atendimento registrado ✓');
}
async function deletarAtend(id){
  if(!confirm('Excluir atendimento?')) return;
  S.regs=S.regs.filter(r=>r.id!==id); S.recebimentos=S.recebimentos.filter(r=>r.reg_id!==id);
  lsSave('regs',S.regs); lsSave('recebimentos',S.recebimentos);
  await cloudDelete('registros',id); renderListaAtend(); showToast('Atendimento excluído');
}

function atualizarFluxo(){
  const mes=(document.getElementById('mesFluxo')||{value:mesAtual()}).value||mesAtual();
  const recs=S.recebimentos.filter(r=>r.data_prevista&&r.data_prevista.startsWith(mes));
  const recebido=recs.filter(r=>r.status==='recebido').reduce((s,r)=>s+(+r.valor||0),0);
  const pendente=recs.filter(r=>r.status==='pendente').reduce((s,r)=>s+(+r.valor||0),0);
  const vencido=recs.filter(r=>r.status==='pendente'&&r.data_prevista<today()).reduce((s,r)=>s+(+r.valor||0),0);
  const cards=document.getElementById('fluxoCards');
  if(cards) cards.innerHTML=`
    <div class="card border-l-4 border-green-400"><div class="text-xs text-gray-500">Recebido</div><div class="text-lg font-bold text-green-600">${fmtBRL(recebido)}</div></div>

    <div class="card border-l-4 border-red-400"><div class="text-xs text-gray-500">Vencidos</div><div class="text-lg font-bold text-red-600">${fmtBRL(vencido)}</div></div>`;
  const tb=document.getElementById('tbodyFluxo'); if(!tb) return;
  const sorted=[...recs].sort((a,b)=>a.data_prevista>b.data_prevista?1:-1);
  if(!sorted.length){ tb.innerHTML=`<tr><td colspan="5" class="text-center py-4 text-gray-400">Nenhum lançamento</td></tr>`; return; }
  tb.innerHTML=sorted.map(r=>{
    const v=r.status==='pendente'&&r.data_prevista<today();
    return `<tr class="border-b hover:bg-gray-50">
      <td class="p-2">${escHtml(r.descricao||'-')}</td>
      <td class="p-2 text-center text-xs">${r.data_prevista}</td>
      <td class="p-2 text-center font-semibold">${fmtBRL(r.valor)}</td>
      <td class="p-2 text-center"><span class="tag ${r.status==='recebido'?'tag-green':v?'tag-red':'tag-yellow'}">${r.status==='recebido'?'✓ Recebido':v?'⚠ Vencido':'⏳ Pendente'}</span></td>
      <td class="p-2 text-center no-print">${r.status==='pendente'?`<button onclick="confirmarReceb('${r.id}')" class="btn btn-sm btn-ghost">✓ Confirmar</button>`:''}</td>
    </tr>`;
  }).join('');
}
async function confirmarReceb(id){
  const rec=S.recebimentos.find(r=>r.id===id); if(!rec) return;
  rec.status='recebido'; rec.data_recebido=today();
  lsSave('recebimentos',S.recebimentos); await cloudUpsert('recebimentos',rec);
  atualizarFluxo(); showToast('Recebimento confirmado ✓');
}

async function salvarCfg(){
  S.cfg={...S.cfg,
    horas:+document.getElementById('cfg_horas').value||139.41,
    imposto:+document.getElementById('cfg_imposto').value||6,
    cartao:+document.getElementById('cfg_cartao').value||3.5,
    lucro:+document.getElementById('cfg_lucro').value||30,
    pro_labore:+document.getElementById('cfg_prolabore').value||0
  };
  lsSave('cfg',S.cfg);
  try{ await sb.from('config_clinica').upsert({...S.cfg,user_id:S.user.id,updated_at:new Date().toISOString()}); }catch(e){}
  document.getElementById('cfgMsg').classList.remove('hidden');
  setTimeout(()=>document.getElementById('cfgMsg')?.classList.add('hidden'),2000);
}

function renderListaFixos(){
  const el=document.getElementById('listaFixos'); const tel=document.getElementById('totalFixos');
  if(!el) return;
  const total=S.fixos.reduce((s,f)=>s+(+f.valor||0),0);
  if(tel) tel.textContent=`Total Mensal: ${fmtBRL(total)} | Custo/min: ${fmtBRL(calcCustoMinuto())}`;
  if(!S.fixos.length){ el.innerHTML='<div class="text-sm text-gray-400 py-3">Nenhum custo fixo cadastrado</div>'; return; }
  el.innerHTML=`<table class="w-full text-sm"><tbody>
  ${S.fixos.map(f=>`<tr class="border-b hover:bg-gray-50">
    <td class="py-2">${escHtml(f.descricao)}</td>
    <td class="py-2 text-center text-xs text-gray-400">${f.vencimento_dia?`vence dia ${f.vencimento_dia}`:''}</td>
    <td class="py-2 text-right font-semibold">${fmtBRL(f.valor)}</td>
    <td class="py-2 text-right no-print"><button onclick="abrirModalFixo('${f.id}')" class="btn btn-sm btn-secondary">✏</button> <button onclick="deletarFixo('${f.id}')" class="btn btn-sm btn-danger">🗑</button></td>
  </tr>`).join('')}
  </tbody></table>`;
}
let editingFixoId=null;
function abrirModalFixo(id=null){
  editingFixoId=id; const f=id?S.fixos.find(x=>x.id===id):null;
  document.getElementById('modalFixoTitle').textContent=id?'Editar Custo Fixo':'Novo Custo Fixo';
  document.getElementById('ff_desc').value=f?f.descricao:'';
  document.getElementById('ff_valor').value=f?f.valor:'';
  document.getElementById('ff_dia').value=f?f.vencimento_dia||'':'';
  document.getElementById('modalFixo').classList.remove('hidden');
}
function fecharModalFixo(){ document.getElementById('modalFixo').classList.add('hidden'); }
async function salvarFixo(){
  const desc=document.getElementById('ff_desc').value.trim(); if(!desc) return showToast('Informe a descrição','error');
  const id=editingFixoId||uid();
  const dia=+document.getElementById('ff_dia').value||null;
  const obj={id,descricao:desc,valor:+document.getElementById('ff_valor').value||0,vencimento_dia:dia};
  S.fixos=S.fixos.filter(f=>f.id!==id); S.fixos.push(obj);
  lsSave('fixos',S.fixos); await cloudUpsert('custos_fixos',obj);
  fecharModalFixo(); renderListaFixos(); showToast('Custo fixo salvo ✓');
}
async function deletarFixo(id){
  if(!confirm('Excluir custo fixo?')) return;
  S.fixos=S.fixos.filter(f=>f.id!==id); lsSave('fixos',S.fixos);
  await cloudDelete('custos_fixos',id); renderListaFixos(); showToast('Custo fixo excluído');
}

function renderTbodyInsumos(){
  const tb=document.getElementById('tbodyInsumos'); if(!tb) return;
  if(!S.insumos.length){ tb.innerHTML=`<tr><td colspan="7" class="text-center py-6 text-gray-400">Nenhum insumo cadastrado</td></tr>`; return; }
  tb.innerHTML=S.insumos.map(i=>{
    const baixo=(+i.estoque||0)<=(+i.estoque_min||0)&&(+i.estoque_min||0)>0;
    return `<tr class="border-b hover:bg-gray-50">
      <td class="p-2 font-medium">${escHtml(i.nome)}</td>
      <td class="p-2 text-center text-xs text-gray-500">${i.categoria||'-'}</td>
      <td class="p-2 text-center">${fmtBRL(i.custo)}</td>
      <td class="p-2 text-center">${i.estoque||0} ${i.unidade||''}</td>
      <td class="p-2 text-center text-gray-400">${i.estoque_min||0}</td>
      <td class="p-2 text-center"><span class="tag ${baixo?'tag-red':'tag-green'}">${baixo?'⚠ Baixo':'OK'}</span></td>
      <td class="p-2 text-center no-print">
        <button onclick="abrirModalInsumo('${i.id}')" class="btn btn-sm btn-secondary">✏</button>
        <button onclick="deletarInsumo('${i.id}')" class="btn btn-sm btn-danger">🗑</button>
      </td></tr>`;
  }).join('');
}

function alertarWhatsApp(){
  const baixos=S.insumos.filter(i=>(+i.estoque||0)<=(+i.estoque_min||0)&&(+i.estoque_min||0)>0);
  if(!baixos.length) return showToast('Nenhum insumo em alerta de estoque','warn');
  const msg=`⚠️ *Alerta de Estoque — Clínica Dra Mariana*\n\n`+baixos.map(i=>`• *${i.nome}*: ${i.estoque||0} ${i.unidade||'un'} (mín: ${i.estoque_min})`).join('\n')+`\n\n_Sistema de Gestão Financeira_`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,'_blank');
}
function abrirModalCompra(){ document.getElementById('modalCompra').classList.remove('hidden'); }
function fecharModalCompra(){ document.getElementById('modalCompra').classList.add('hidden'); }
async function salvarCompra(){
  const data=document.getElementById('fc_data').value;
  const insumoId=document.getElementById('fc_insumo').value;
  const qtd=+document.getElementById('fc_qtd').value||0;
  const valor=+document.getElementById('fc_valor').value||0;
  if(!data||!insumoId||!qtd) return showToast('Preencha todos os campos','error');
  const ins=S.insumos.find(i=>i.id===insumoId);
  const obj={id:uid(),data,insumo_id:insumoId,insumo_nome:ins?ins.nome:'',qtd,valor_total:valor};
  S.compras.push(obj); lsSave('compras',S.compras); await cloudUpsert('compras_estoque',obj);
  if(ins){ ins.estoque=(+ins.estoque||0)+qtd; S.insumos=S.insumos.map(i=>i.id===ins.id?ins:i); lsSave('insumos',S.insumos); await cloudUpsert('insumos',ins); }
  fecharModalCompra(); renderTbodyInsumos(); renderListaCompras(); showToast('Compra registrada ✓');
}

(async function init(){
  try{
    const timeout=new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),5000));
    const {data:{session}}=await Promise.race([sb.auth.getSession(),timeout]);
    if(session?.user){
      S.user=session.user;
      loadLocalStorage();
      showApp();
      loadCloud();
    }
  }catch(e){}
})();
</script>
