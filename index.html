function seedDefaultData(){
  const key=lsKey('seeded_v4'); if(localStorage.getItem(key)) return;
  // Merge por nome: adiciona apenas o que não existe (preserva dados customizados)

  let procChanged=false;
  DEFAULT_PROCS.forEach(p=>{
    const existe=S.procs.some(x=>x.nome.toLowerCase()===p.nome.toLowerCase());
    if(!existe){
      const obj={id:uid(),nome:p.nome,categoria:p.categoria,tempo:0,preco:0,ficha:[],sessoes_pacote:p.sessoes_pacote||0};
      S.procs.push(obj); cloudUpsert('procedimentos',obj); procChanged=true;
    }
  });
  if(procChanged) lsSave('procs',S.procs);

  let insChanged=false;
  DEFAULT_INSUMOS.forEach(ins=>{
    const existe=S.insumos.some(x=>x.nome.toLowerCase()===ins.nome.toLowerCase());
    if(!existe){
      const obj={id:uid(),nome:ins.nome,categoria:ins.categoria,unidade:ins.unidade||'un',
        custo:0,estoque:0,estoque_min:0,qtd_por_embalagem:ins.qtd_por_embalagem||null,unidade_uso:ins.unidade_uso||null};
      S.insumos.push(obj); cloudUpsert('insumos',obj); insChanged=true;
    }
  });
  if(insChanged) lsSave('insumos',S.insumos);

  let fixoChanged=false;
  DEFAULT_FIXOS.forEach(f=>{
    const existe=S.fixos.some(x=>x.descricao.toLowerCase()===f.descricao.toLowerCase());
    if(!existe){
      const obj={id:uid(),descricao:f.descricao,valor:f.valor,vencimento_dia:f.vencimento_dia};
      S.fixos.push(obj); cloudUpsert('custos_fixos',obj); fixoChanged=true;
    }
  });
  if(fixoChanged) lsSave('fixos',S.fixos);

  localStorage.setItem(key,'1');
}

// ── LocalStorage ──────────────────────────────
function lsKey(t){ return `gf_${S.user.id.slice(0,8)}_${t}`; }
function lsSave(t,d){ try{ localStorage.setItem(lsKey(t),JSON.stringify(d)); }catch(e){} }
function lsLoad(t){ try{ return JSON.parse(localStorage.getItem(lsKey(t)))||[]; }catch(e){ return []; } }
function lsLoadObj(t,def={}){ try{ return JSON.parse(localStorage.getItem(lsKey(t)))||def; }catch(e){ return def; } }

async function cloudUpsert(table,obj){ try{ const {error}=await sb.from(table).upsert({...obj,user_id:S.user.id}); if(error) console.warn(table,error.message); }catch(e){} }
async function cloudDelete(table,id){ try{ await sb.from(table).delete().eq('id',id).eq('user_id',S.user.id); }catch(e){} }

  document.getElementById('loginErr').classList.add('hidden');

  if(!email||!pass){ showAuthErr('Preencha e-mail e senha.'); return; }

  if(_authMode==='signup'){
    if(pass.length<6){ showAuthErr('Senha precisa ter ao menos 6 caracteres.'); return; }
    if(pass!==passConfirm){ showAuthErr('As senhas não coincidem.'); return; }
    if(btn){ btn.textContent='Criando…'; btn.disabled=true; }
    let res;
    try{ res=await sb.auth.signUp({email,password:pass}); }catch(e){ res={error:e}; }
    if(btn){ btn.textContent='Criar Conta'; btn.disabled=false; }
    if(res?.error){ showAuthErr(res.error.message||'Erro ao criar conta.'); return; }
    if(res?.data?.user && !res.data.session){
      showAuthOk('Conta criada! Verifique seu e-mail para confirmar antes de entrar.');
    } else if(res?.data?.session){
      S.user=res.data.session.user;
      loadLocalStorage(); showApp(); loadCloud();
    } else {
      showAuthOk('Conta criada! Faça login agora.');
      switchAuthTab('login');
    }
    return;
  }

  // login
  if(btn){ btn.textContent='Entrando…'; btn.disabled=true; }
  let res;
  try{ res=await sb.auth.signInWithPassword({email,password:pass}); }catch(e){ res={error:e}; }
  if(btn){ btn.textContent='Entrar'; btn.disabled=false; }
  if(res?.error||!res?.data?.user){
    const msg=res?.error?.message||'Erro ao entrar.';
    showAuthErr(msg.includes('credentials')||msg.includes('Invalid')?'E-mail ou senha incorretos.':msg);
    return;
  }
  S.user=res.data.user;
  loadLocalStorage(); showApp(); loadCloud();
}

async function cloudLoad(table){
  try{
    const t=new Promise(r=>setTimeout(()=>r(null),5000));
    const q=sb.from(table).select('*').eq('user_id',S.user.id);
    const res=await Promise.race([q,t]);
    if(!res||res.error) return null;
    return res.data;
  }catch(e){ return null; }
}

async function loadCloud() {
  setSyncStatus('Sincronizando…','text-yellow-500');
  const tables=[['insumos','insumos'],['custos_fixos','fixos'],['procedimentos','procs'],
    ['registros','regs'],['recebimentos','recebimentos'],
    ['despesas_variaveis','despesas'],['compras_estoque','compras'],['metas_mensais','metas'],
    ['financiamentos','financiamentos']];
  try{
    const results=await Promise.all(tables.map(([tbl])=>cloudLoad(tbl)));
    results.forEach((d,i)=>{ if(d){ S[tables[i][1]]=d; lsSave(tables[i][1],d); } });
  }catch(e){}
  try{
    const t=new Promise(r=>setTimeout(()=>r(null),5000));
    const q=sb.from('config_clinica').select('*').eq('user_id',S.user.id).maybeSingle();
    const cfgR=await Promise.race([q,t]);
    if(cfgR?.data){ S.cfg={...S.cfg,...cfgR.data}; lsSave('cfg',S.cfg); }
  }catch(e){}
  setSyncStatus('✓ Sincronizado','text-green-500');
  setTimeout(()=>setSyncStatus(''),3000);
  // re-render current page with fresh data
  if(currentPage) goTo(currentPage);
}

async function loadAll() { loadLocalStorage(); await loadCloud(); }

// ── Calculations ──────────────────────────────
function calcCustoMinuto(){
  const totalFixo=S.fixos.reduce((s,f)=>s+(+f.valor||0),0);
  const min=(S.cfg.horas||139.41)*60;
  return min>0?totalFixo/min:0;
}

function calcDRE(mes){
  const regs=S.regs.filter(r=>r.data&&r.data.startsWith(mes));
  const receita=regs.reduce((s,r)=>s+(+r.preco||0),0);
  const custoInsumos=regs.reduce((s,r)=>s+(+r.custo_insumos||0),0);
  const custoTempo=regs.reduce((s,r)=>s+(+r.custo_tempo||0),0);
  const lucroBruto=receita-custoInsumos-custoTempo;
  const totalFixo=S.fixos.reduce((s,f)=>s+(+f.valor||0),0);
  const totalDespesas=S.despesas.filter(d=>d.data&&d.data.startsWith(mes)).reduce((s,d)=>s+(+d.valor||0),0);
  const impostos=receita*(+(S.cfg.imposto||6)/100);
  // Financiamentos ativos: parcelas mensais restantes
  const totalFinanciamentos=(S.financiamentos||[]).filter(f=>(+f.parcelas_pagas||0)<(+f.parcelas_total||1))
    .reduce((s,f)=>s+(+f.parcela_valor||0),0);
  const resultado=lucroBruto-totalFixo-totalDespesas-impostos-totalFinanciamentos;
  const proLabore=+(S.cfg.pro_labore||0);
  const sobra=resultado-proLabore;
  const margem=receita>0?(resultado/receita)*100:0;
  return {receita,custoInsumos,custoTempo,lucroBruto,totalFixo,totalDespesas,totalFinanciamentos,impostos,resultado,proLabore,sobra,margem,atendimentos:regs.length};
}

function calcPreco(custoInsumos,minutos){
  const cm=calcCustoMinuto();
  const custoTempo=cm*minutos;
  const custoTotal=custoInsumos+custoTempo;
  const pI=+(S.cfg.imposto||6),pC=+(S.cfg.cartao||3.5),pL=+(S.cfg.lucro||30);
  const divisor=1-(pI+pC+pL)/100;
  const preco=divisor>0?custoTotal/divisor:custoTotal*2;
  return {custoInsumos,custoTempo,custoTotal,preco,pctImposto:pI,pctCartao:pC,pctLucro:pL,
    vlrImposto:preco*(pI/100),vlrCartao:preco*(pC/100),vlrLucro:preco*(pL/100)};
}

    const calcA=calcPreco(a.ficha?.reduce((s,f)=>{ const ins=S.insumos.find(i=>i.id===f.insumo_id); return s+(ins?custoUso(ins)*(+f.qtd||0):0); },0)||0,+a.tempo||0);
    const calcB=calcPreco(b.ficha?.reduce((s,f)=>{ const ins=S.insumos.find(i=>i.id===f.insumo_id); return s+(ins?custoUso(ins)*(+f.qtd||0):0); },0)||0,+b.tempo||0);
    return ((+b.preco||0)-calcB.custoTotal)-((+a.preco||0)-calcA.custoTotal);
  });
  // group by categoria
  const cats=[...new Set(procsOrdenados.map(p=>p.categoria||'Geral'))];
  el.innerHTML=cats.map(cat=>{
    const procs=procsOrdenados.filter(p=>(p.categoria||'Geral')===cat);
    return `<div class="mb-4">
      <div class="text-xs font-bold text-rose-600 uppercase tracking-wide mb-2">${escHtml(cat)}</div>
      <div class="space-y-3">${procs.map((p,idx)=>{
        const ficha=Array.isArray(p.ficha)?p.ficha:[];
        const custoIns=ficha.reduce((s,f)=>{ const ins=S.insumos.find(i=>i.id===f.insumo_id); return s+(ins?custoUso(ins)*(+f.qtd||0):0); },0);
        const calc=calcPreco(custoIns,+p.tempo||0);
        const preco=+p.preco||0; const diff=preco-calc.preco;
        return `<div class="card">
          <div class="flex items-start justify-between gap-3">
            <div class="flex-1">
              <div class="font-semibold text-gray-800">${idx===0?'🥇':idx===1?'🥈':idx===2?'🥉':''} ${escHtml(p.nome)}${p.sessoes_pacote>0?` <span class="tag tag-purple text-xs">📦 ${p.sessoes_pacote} sessões</span>`:''}</div>
              <div class="text-xs text-gray-500">${p.tempo||0} min</div>
            </div>
            <div class="text-right flex-shrink-0">
              <div class="font-bold text-gray-800">${fmtBRL(preco)}</div>
              <div class="text-xs ${diff<0?'text-red-500':'text-green-600'}">${diff<0?'⚠':'✓'} sugerido ${fmtBRL(calc.preco)}</div>
            </div>
            <div class="flex gap-1 no-print">
              <button onclick="abrirModalProc('${p.id}')" class="btn btn-sm btn-secondary">✏</button>
              <button onclick="deletarProc('${p.id}')" class="btn btn-sm btn-danger">🗑</button>
            </div>
          </div>
          <div class="mt-3 bg-gray-50 rounded-xl p-3 grid grid-cols-2 gap-x-4 gap-y-1 text-xs">
            <div class="flex justify-between"><span class="text-gray-500">Custo Insumos</span><span>${fmtBRL(calc.custoInsumos)}</span></div>
            <div class="flex justify-between"><span class="text-gray-500">Custo Tempo</span><span>${fmtBRL(calc.custoTempo)}</span></div>
            <div class="flex justify-between"><span class="text-gray-500">Impostos (${fmtPct(calc.pctImposto)})</span><span>${fmtBRL(calc.vlrImposto)}</span></div>
            <div class="flex justify-between"><span class="text-gray-500">Cartão (${fmtPct(calc.pctCartao)})</span><span>${fmtBRL(calc.vlrCartao)}</span></div>
            <div class="col-span-2 border-t pt-1 flex justify-between font-semibold text-green-700">
              <span>Lucro (${fmtPct(calc.pctLucro)})</span><span>${fmtBRL(calc.vlrLucro)}</span>
            </div>
            <div class="col-span-2 border-t pt-1 flex justify-between font-bold text-rose-700">
              <span>💡 Preço Sugerido</span><span>${fmtBRL(calc.preco)}</span>
            </div>
          </div>
        </div>`;
      }).join('')}</div>
    </div>`;
  }).join('');
}

function preencherAtendProc(){
  const pid=document.getElementById('fa_proc').value;
  const p=S.procs.find(x=>x.id===pid); if(!p) return;
  document.getElementById('fa_preco').value=p.preco||'';
  const ficha=Array.isArray(p.ficha)?p.ficha:[];
  const custoIns=ficha.reduce((s,f)=>{ const ins=S.insumos.find(i=>i.id===f.insumo_id); return s+(ins?custoUso(ins)*(+f.qtd||0):0); },0);
  const cm=calcCustoMinuto(); const custoTempo=cm*(+p.tempo||0);
  const el=document.getElementById('resumoAtend'); el.classList.remove('hidden');

  if(p.sessoes_pacote>0) txt+=` | 📦 Pacote: ${p.sessoes_pacote} sessões`;

  atualizarSplitInfo();
}

function editarAtend(id){
  const r=S.regs.find(x=>x.id===id); if(!r) return;
  abrirModalAtend();
  setTimeout(()=>{
    document.getElementById('fa_data').value=r.data||'';
    const pr=document.getElementById('fa_proc'); if(pr){ pr.value=r.proc_id||''; preencherAtendProc(); }
    document.getElementById('fa_preco').value=r.preco||'';
    const pg=document.getElementById('fa_pag'); if(pg) pg.value=r.pagamento||'Dinheiro';
    document.getElementById('modalAtend').dataset.editId=id;
  },50);
}
async function salvarAtend(){
  const data=document.getElementById('fa_data').value;
  const procId=document.getElementById('fa_proc').value;
  const preco=+document.getElementById('fa_preco').value||0;
  const pag1=document.getElementById('fa_pag').value;
  const pag2=document.getElementById('fa_pag2')?.value||'';
  const val1raw=+document.getElementById('fa_val1')?.value||0;
  if(!data||!procId) return showToast('Informe data e procedimento','error');
  const proc=S.procs.find(p=>p.id===procId);
  const ficha=proc&&Array.isArray(proc.ficha)?proc.ficha:[];
  const custoInsumos=ficha.reduce((s,f)=>{ const ins=S.insumos.find(i=>i.id===f.insumo_id); return s+(ins?custoUso(ins)*(+f.qtd||0):0); },0);
  const cm=calcCustoMinuto(); const custoTempo=cm*(+(proc&&proc.tempo)||0);
  // Montar pagamentos (split ou simples)
  let pagamentos;
  if(pag2&&val1raw>0&&val1raw<preco){
    pagamentos=[{metodo:pag1,valor:val1raw},{metodo:pag2,valor:preco-val1raw}];
  } else {
    pagamentos=[{metodo:pag1,valor:preco}];
  }
  const editId=document.getElementById('modalAtend').dataset.editId||'';
  if(editId){ S.regs=S.regs.filter(r=>r.id!==editId); S.recebimentos=S.recebimentos.filter(r=>r.reg_id!==editId); await cloudDelete('registros',editId); }
  document.getElementById('modalAtend').dataset.editId='';
  const id=editId||uid();
  const obj={id,data,proc_id:procId,proc_nome:proc?.nome||'',paciente_id:null,paciente_nome:'',
    preco,pagamento:pagamentos.map(p=>p.metodo).join(' + '),pagamentos:JSON.stringify(pagamentos),
    parcelas:1,custo_insumos:custoInsumos,custo_tempo:custoTempo};
  // validar estoque
  const alertasEstoque=[];
  for(const f of ficha){
    const ins=S.insumos.find(i=>i.id===f.insumo_id);
    if(!ins) continue;
    const fator=+ins.qtd_por_embalagem||1;
    const embNecessaria=(+f.qtd||0)/fator;
    if((+ins.estoque||0)<embNecessaria) alertasEstoque.push(`${ins.nome}: tem ${ins.estoque} ${ins.unidade||'un'}, precisa ${embNecessaria.toFixed(2)}`);
  }
  if(alertasEstoque.length>0&&!confirm(`⚠️ Estoque insuficiente:\n${alertasEstoque.join('\n')}\n\nRegistrar mesmo assim?`)) return;
  for(const f of ficha){
    const ins=S.insumos.find(i=>i.id===f.insumo_id);
    if(ins){ const fator=+ins.qtd_por_embalagem||1; ins.estoque=Math.max(0,(+ins.estoque||0)-(+f.qtd||0)/fator); S.insumos=S.insumos.map(i=>i.id===ins.id?ins:i); await cloudUpsert('insumos',ins); }
  }
  lsSave('insumos',S.insumos);
  S.regs.push(obj); lsSave('regs',S.regs); await cloudUpsert('registros',obj);
  // Gerar recebimentos por forma de pagamento
  for(const pg of pagamentos){
    const parc=parseInt((pg.metodo.match(/(\d+)x/)||[0,1])[1])||1;
    const vParcela=pg.valor/parc;
    for(let p=1;p<=parc;p++){
      const dp=new Date(data); dp.setMonth(dp.getMonth()+(p-1));
      const rec={id:uid(),reg_id:id,
        descricao:`${proc?.nome||'Atend.'}${pagamentos.length>1?` [${pg.metodo}]`:''}${parc>1?` (${p}/${parc})`:''}`,
        data_prevista:dp.toISOString().slice(0,10),data_recebido:parc===1?data:null,
        valor:vParcela,status:parc===1?'recebido':'pendente',parcela:p,total_parcelas:parc};
      S.recebimentos.push(rec); await cloudUpsert('recebimentos',rec);
    }
  }
  lsSave('recebimentos',S.recebimentos);
  fecharModalAtend(); renderListaAtend(); showToast('Atendimento registrado ✓');
}
async function deletarAtend(id){
  if(!confirm('Excluir atendimento?')) return;
  S.regs=S.regs.filter(r=>r.id!==id); S.recebimentos=S.recebimentos.filter(r=>r.reg_id!==id);
  lsSave('regs',S.regs); lsSave('recebimentos',S.recebimentos);
  await cloudDelete('registros',id); renderListaAtend(); showToast('Atendimento excluído');
}

function atualizarFluxo(){
  const mes=(document.getElementById('mesFluxo')||{value:mesAtual()}).value||mesAtual();
  const recs=S.recebimentos.filter(r=>r.data_prevista&&r.data_prevista.startsWith(mes));
  const recebido=recs.filter(r=>r.status==='recebido').reduce((s,r)=>s+(+r.valor||0),0);
  const pendente=recs.filter(r=>r.status==='pendente').reduce((s,r)=>s+(+r.valor||0),0);
  const vencido=recs.filter(r=>r.status==='pendente'&&r.data_prevista<today()).reduce((s,r)=>s+(+r.valor||0),0);
  const cards=document.getElementById('fluxoCards');
  if(cards) cards.innerHTML=`
    <div class="card border-l-4 border-green-400"><div class="text-xs text-gray-500">Recebido</div><div class="text-lg font-bold text-green-600">${fmtBRL(recebido)}</div></div>
    <div class="card border-l-4 border-yellow-400"><div class="text-xs text-gray-500">A Receber</div><div class="text-lg font-bold text-yellow-600">${fmtBRL(pendente)}</div></div>
    <div class="card border-l-4 border-red-400"><div class="text-xs text-gray-500">Vencidos</div><div class="text-lg font-bold text-red-600">${fmtBRL(vencido)}</div></div>`;
  const tb=document.getElementById('tbodyFluxo'); if(!tb) return;
  const sorted=[...recs].sort((a,b)=>a.data_prevista>b.data_prevista?1:-1);
  if(!sorted.length){ tb.innerHTML=`<tr><td colspan="5" class="text-center py-4 text-gray-400">Nenhum lançamento</td></tr>`; return; }
  tb.innerHTML=sorted.map(r=>{
    const v=r.status==='pendente'&&r.data_prevista<today();
    return `<tr class="border-b hover:bg-gray-50">
      <td class="p-2">${escHtml(r.descricao||'-')}</td>
      <td class="p-2 text-center text-xs">${r.data_prevista}</td>
      <td class="p-2 text-center font-semibold">${fmtBRL(r.valor)}</td>
      <td class="p-2 text-center"><span class="tag ${r.status==='recebido'?'tag-green':v?'tag-red':'tag-yellow'}">${r.status==='recebido'?'✓ Recebido':v?'⚠ Vencido':'⏳ Pendente'}</span></td>
      <td class="p-2 text-center no-print">${r.status==='pendente'?`<button onclick="confirmarReceb('${r.id}')" class="btn btn-sm btn-ghost">✓</button> <button onclick="abrirAntecip('${r.id}')" class="btn btn-sm btn-secondary text-xs">⚡ Antecipar</button>`:''}</td>
    </tr>`;
  }).join('');
}
async function confirmarReceb(id){
  const rec=S.recebimentos.find(r=>r.id===id); if(!rec) return;
  rec.status='recebido'; rec.data_recebido=today();
  lsSave('recebimentos',S.recebimentos); await cloudUpsert('recebimentos',rec);
  atualizarFluxo(); showToast('Recebimento confirmado ✓');
}
let _antecipId=null;
function abrirAntecip(id){
  _antecipId=id;
  const rec=S.recebimentos.find(r=>r.id===id); if(!rec) return;
  document.getElementById('antecip_orig').textContent=fmtBRL(rec.valor);
  document.getElementById('antecip_taxa').value='2.99';
  document.getElementById('antecip_data').value=today();
  previewAntecip();
  document.getElementById('modalAntecip').classList.remove('hidden');
}
function fecharAntecip(){ document.getElementById('modalAntecip').classList.add('hidden'); }
function previewAntecip(){
  const rec=S.recebimentos.find(r=>r.id===_antecipId); if(!rec) return;
  const taxa=+document.getElementById('antecip_taxa').value||0;
  const taxaVal=rec.valor*(taxa/100);
  const liquido=rec.valor-taxaVal;
  document.getElementById('antecip_preview').innerHTML=`
    <div class="flex justify-between"><span>Valor bruto:</span><span>${fmtBRL(rec.valor)}</span></div>
    <div class="flex justify-between text-red-500"><span>(-) Taxa ${taxa}%:</span><span>(${fmtBRL(taxaVal)})</span></div>
    <div class="flex justify-between font-bold text-green-700 border-t pt-1"><span>= Valor líquido:</span><span>${fmtBRL(liquido)}</span></div>`;
}
async function confirmarAntecip(){
  const rec=S.recebimentos.find(r=>r.id===_antecipId); if(!rec) return;
  const taxa=+document.getElementById('antecip_taxa').value||0;
  const novaData=document.getElementById('antecip_data').value;
  rec.valor=rec.valor*(1-taxa/100);
  rec.data_prevista=novaData; rec.status='recebido'; rec.data_recebido=novaData;
  rec.descricao=(rec.descricao||'')+` [Antecipado -${taxa}%]`;
  lsSave('recebimentos',S.recebimentos); await cloudUpsert('recebimentos',rec);
  fecharAntecip(); atualizarFluxo(); showToast('Recebimento antecipado ✓');
}

  el.innerHTML=sorted.map(m=>{

async function salvarCfg(){
  S.cfg={...S.cfg,
    horas:+document.getElementById('cfg_horas').value||139.41,
    imposto:+document.getElementById('cfg_imposto').value||6,
    cartao:+document.getElementById('cfg_cartao').value||3.5,
    lucro:+document.getElementById('cfg_lucro').value||30,
    pro_labore:+document.getElementById('cfg_prolabore').value||0
  };
  lsSave('cfg',S.cfg);
  try{ await sb.from('config_clinica').upsert({...S.cfg,user_id:S.user.id,updated_at:new Date().toISOString()}); }catch(e){}
  document.getElementById('cfgMsg').classList.remove('hidden');
  setTimeout(()=>document.getElementById('cfgMsg')?.classList.add('hidden'),2000);
}

function renderListaFixos(){
  const el=document.getElementById('listaFixos'); const tel=document.getElementById('totalFixos');
  if(!el) return;
  const total=S.fixos.reduce((s,f)=>s+(+f.valor||0),0);
  if(tel) tel.textContent=`Total Mensal: ${fmtBRL(total)} | Custo/min: ${fmtBRL(calcCustoMinuto())}`;
  if(!S.fixos.length){ el.innerHTML='<div class="text-sm text-gray-400 py-3">Nenhum custo fixo cadastrado</div>'; return; }
  el.innerHTML=`<table class="w-full text-sm"><tbody>
  ${S.fixos.map(f=>`<tr class="border-b hover:bg-gray-50">
    <td class="py-2">${escHtml(f.descricao)}</td>
    <td class="py-2 text-center text-xs text-gray-400">${f.vencimento_dia?`vence dia ${f.vencimento_dia}`:''}</td>
    <td class="py-2 text-right font-semibold">${fmtBRL(f.valor)}</td>
    <td class="py-2 text-right no-print"><button onclick="abrirModalFixo('${f.id}')" class="btn btn-sm btn-secondary">✏</button> <button onclick="deletarFixo('${f.id}')" class="btn btn-sm btn-danger">🗑</button></td>
  </tr>`).join('')}
  </tbody></table>`;
}
let editingFixoId=null;
function abrirModalFixo(id=null){
  editingFixoId=id; const f=id?S.fixos.find(x=>x.id===id):null;
  document.getElementById('modalFixoTitle').textContent=id?'Editar Custo Fixo':'Novo Custo Fixo';
  document.getElementById('ff_desc').value=f?f.descricao:'';
  document.getElementById('ff_valor').value=f?f.valor:'';
  document.getElementById('ff_dia').value=f?f.vencimento_dia||'':'';
  document.getElementById('modalFixo').classList.remove('hidden');
}
function fecharModalFixo(){ document.getElementById('modalFixo').classList.add('hidden'); }
async function salvarFixo(){
  const desc=document.getElementById('ff_desc').value.trim(); if(!desc) return showToast('Informe a descrição','error');
  const id=editingFixoId||uid();
  const dia=+document.getElementById('ff_dia').value||null;
  const obj={id,descricao:desc,valor:+document.getElementById('ff_valor').value||0,vencimento_dia:dia};
  S.fixos=S.fixos.filter(f=>f.id!==id); S.fixos.push(obj);
  lsSave('fixos',S.fixos); await cloudUpsert('custos_fixos',obj);
  fecharModalFixo(); renderListaFixos(); showToast('Custo fixo salvo ✓');
}
async function deletarFixo(id){
  if(!confirm('Excluir custo fixo?')) return;
  S.fixos=S.fixos.filter(f=>f.id!==id); lsSave('fixos',S.fixos);
  await cloudDelete('custos_fixos',id); renderListaFixos(); showToast('Custo fixo excluído');
}

let editingFinId=null;
function abrirModalFin(id=null){
  editingFinId=id; const f=id?S.financiamentos.find(x=>x.id===id):null;
  document.getElementById('modalFinTitle').textContent=id?'Editar Financiamento':'Novo Financiamento';
  document.getElementById('fn_desc').value=f?.descricao||'';
  document.getElementById('fn_parcela').value=f?.parcela_valor||'';
  document.getElementById('fn_total').value=f?.parcelas_total||'';
  document.getElementById('fn_pagas').value=f?.parcelas_pagas||0;
  document.getElementById('fn_inicio').value=f?.data_inicio||today();
  document.getElementById('modalFin').classList.remove('hidden');
}
function fecharModalFin(){ document.getElementById('modalFin').classList.add('hidden'); }
async function salvarFin(){
  const desc=document.getElementById('fn_desc').value.trim(); if(!desc) return showToast('Informe a descrição','error');
  const id=editingFinId||uid();
  const obj={id,descricao:desc,
    parcela_valor:+document.getElementById('fn_parcela').value||0,
    parcelas_total:+document.getElementById('fn_total').value||1,
    parcelas_pagas:+document.getElementById('fn_pagas').value||0,
    data_inicio:document.getElementById('fn_inicio').value};
  S.financiamentos=S.financiamentos.filter(f=>f.id!==id); S.financiamentos.push(obj);
  lsSave('financiamentos',S.financiamentos); await cloudUpsert('financiamentos',obj);
  fecharModalFin(); renderListaFinanciamentos(); showToast('Financiamento salvo ✓');
}
async function pagarParcelaFin(id){
  const f=S.financiamentos.find(x=>x.id===id); if(!f) return;
  f.parcelas_pagas=Math.min((+f.parcelas_pagas||0)+1,+f.parcelas_total||1);
  lsSave('financiamentos',S.financiamentos); await cloudUpsert('financiamentos',f);
  renderListaFinanciamentos(); showToast('Parcela registrada ✓');
}
async function deletarFin(id){
  if(!confirm('Excluir financiamento?')) return;
  S.financiamentos=S.financiamentos.filter(f=>f.id!==id); lsSave('financiamentos',S.financiamentos);
  await cloudDelete('financiamentos',id); renderListaFinanciamentos(); showToast('Financiamento excluído');
}
function renderListaFinanciamentos(){
  const el=document.getElementById('listaFinanciamentos'); if(!el) return;
  if(!S.financiamentos.length){ el.innerHTML='<div class="text-sm text-gray-400 py-3">Nenhum financiamento cadastrado</div>'; return; }
  el.innerHTML=`<table class="w-full text-sm"><thead><tr class="table-header">
    <th class="p-2 text-left">Descrição</th><th class="p-2">Parcela</th><th class="p-2">Progresso</th><th class="p-2">Restante</th><th class="p-2 no-print"></th>
  </tr></thead><tbody>
  ${S.financiamentos.map(f=>{
    const pagas=+f.parcelas_pagas||0; const total=+f.parcelas_total||1;
    const restantes=total-pagas; const pct=Math.min((pagas/total)*100,100);
    const ativo=restantes>0;
    return `<tr class="border-b hover:bg-gray-50">
      <td class="p-2 font-medium">${escHtml(f.descricao)}</td>
      <td class="p-2 text-center">${fmtBRL(f.parcela_valor)}/mês</td>
      <td class="p-2 text-center">
        <div class="text-xs text-gray-500 mb-1">${pagas}/${total}</div>
        <div class="progress-bar w-24 mx-auto"><div class="progress-fill" style="width:${pct}%;background:${pct>=100?'#10b981':'#e11d48'}"></div></div>
      </td>
      <td class="p-2 text-center"><span class="tag ${ativo?'tag-yellow':'tag-green'}">${ativo?`${restantes}x ${fmtBRL((+f.parcela_valor||0)*restantes)}`:'✓ Quitado'}</span></td>
      <td class="p-2 text-center no-print flex gap-1 justify-center">
        ${ativo?`<button onclick="pagarParcelaFin('${f.id}')" class="btn btn-sm btn-ghost">✓ Pagar</button>`:''}
        <button onclick="abrirModalFin('${f.id}')" class="btn btn-sm btn-secondary">✏</button>
        <button onclick="deletarFin('${f.id}')" class="btn btn-sm btn-danger">🗑</button>
      </td></tr>`;
  }).join('')}
  </tbody></table>`;
}

function renderTbodyInsumos(){
  const tb=document.getElementById('tbodyInsumos'); if(!tb) return;
  if(!S.insumos.length){ tb.innerHTML=`<tr><td colspan="7" class="text-center py-6 text-gray-400">Nenhum insumo cadastrado</td></tr>`; return; }
  tb.innerHTML=S.insumos.map(i=>{
    const baixo=(+i.estoque||0)<=(+i.estoque_min||0)&&(+i.estoque_min||0)>0;
    const emb=!!i.qtd_por_embalagem;
    const cu=custoUso(i); const lu=labelUso(i);
    const estoqueLabel=emb?`${i.estoque||0} ${i.unidade||'emb'}`:`${i.estoque||0} ${lu}`;
    const embInfo=emb?`<span class="text-xs text-gray-400 block">${i.qtd_por_embalagem}${lu}/${i.unidade||'emb'}</span>`:'';
    return `<tr class="border-b hover:bg-gray-50">
      <td class="p-2 font-medium">${escHtml(i.nome)}${embInfo}</td>
      <td class="p-2 text-center text-xs text-gray-500">${i.categoria||'-'}</td>
      <td class="p-2 text-center text-xs">${fmtBRL(cu)}<span class="text-gray-400">/${lu}</span></td>
      <td class="p-2 text-center">${estoqueLabel}</td>
      <td class="p-2 text-center text-gray-400 text-xs">${i.estoque_min||0}</td>
      <td class="p-2 text-center"><span class="tag ${baixo?'tag-red':'tag-green'}">${baixo?'⚠ Baixo':'OK'}</span></td>
      <td class="p-2 text-center no-print">
        <button onclick="abrirModalInsumo('${i.id}')" class="btn btn-sm btn-secondary">✏</button>
        <button onclick="deletarInsumo('${i.id}')" class="btn btn-sm btn-danger">🗑</button>
      </td></tr>`;
  }).join('');
}
function renderListaCompras(){
  const el=document.getElementById('listaCompras'); if(!el) return;
  const last=[...S.compras].sort((a,b)=>b.data>a.data?1:-1).slice(0,8);
  if(!last.length){ el.innerHTML='<div class="text-xs text-gray-400">Nenhuma compra registrada</div>'; return; }
  el.innerHTML=`<table class="w-full text-sm"><thead><tr class="table-header"><th class="p-2 text-left">Data</th><th class="p-2 text-left">Insumo</th><th class="p-2">Qtd</th><th class="p-2">Valor</th></tr></thead><tbody>
  ${last.map(c=>`<tr class="border-b"><td class="p-2 text-xs">${c.data}</td><td class="p-2">${escHtml(c.insumo_nome||'-')}</td><td class="p-2 text-center">${c.qtd}</td><td class="p-2 text-center">${fmtBRL(c.valor_total)}</td></tr>`).join('')}
  </tbody></table>`;
}
function toggleInsumoTipo(){
  const tipo=document.getElementById('fi_tipo').value;
  const emb=tipo==='embalagem';
  document.getElementById('fi_bloco_embalagem').classList.toggle('hidden',!emb);
  document.getElementById('fi_label_custo').textContent=emb?'Custo da embalagem (R$)':'Custo por unidade (R$)';
  document.getElementById('fi_label_unidade').textContent=emb?'Nome da embalagem (frasco, caixa…)':'Unidade (un, par, ml, g)';
  document.getElementById('fi_label_estoque').textContent=emb?'Estoque atual (embalagens)':'Estoque atual';
  previewCustoUso();
}
function previewCustoUso(){
  const el=document.getElementById('fi_preview_custo'); if(!el) return;
  const custo=+document.getElementById('fi_custo').value||0;
  const qtd=+document.getElementById('fi_qtd_emb').value||0;
  const un=document.getElementById('fi_unidade_uso').value||'un';
  if(custo&&qtd){ el.textContent=`→ Custo por ${un}: ${fmtBRL(custo/qtd)}`; el.classList.remove('hidden'); }
  else el.classList.add('hidden');
}

let editingInsumoId=null;
function abrirModalInsumo(id=null){
  editingInsumoId=id; const i=id?S.insumos.find(x=>x.id===id):null;
  document.getElementById('modalInsumoTitle').textContent=id?'Editar Insumo':'Novo Insumo';
  ['fi_nome','fi_cat','fi_unidade','fi_custo','fi_estoque','fi_min','fi_qtd_emb','fi_unidade_uso'].forEach(fid=>{ const el=document.getElementById(fid); if(el) el.value=''; });
  const tipo=i?.qtd_por_embalagem?'embalagem':'simples';
  document.getElementById('fi_tipo').value=tipo;
  if(i){
    document.getElementById('fi_nome').value=i.nome||'';
    document.getElementById('fi_cat').value=i.categoria||'';
    document.getElementById('fi_custo').value=i.custo||'';
    document.getElementById('fi_estoque').value=i.estoque||'';
    document.getElementById('fi_min').value=i.estoque_min||'';
    if(tipo==='embalagem'){
      document.getElementById('fi_unidade').value=i.unidade||'';
      document.getElementById('fi_qtd_emb').value=i.qtd_por_embalagem||'';
      document.getElementById('fi_unidade_uso').value=i.unidade_uso||'';
    } else {
      document.getElementById('fi_unidade').value=i.unidade||i.unidade_uso||'';
    }
  }
  toggleInsumoTipo();
  document.getElementById('modalInsumo').classList.remove('hidden');
}
function fecharModalInsumo(){ document.getElementById('modalInsumo').classList.add('hidden'); }
async function salvarInsumo(){
  const nome=document.getElementById('fi_nome').value.trim(); if(!nome) return showToast('Informe o nome','error');
  const id=editingInsumoId||uid();
  const tipo=document.getElementById('fi_tipo').value;
  const emb=tipo==='embalagem';
  const obj={id,nome,
    categoria:document.getElementById('fi_cat').value.trim()||'Geral',
    unidade:document.getElementById('fi_unidade').value.trim(),
    custo:+document.getElementById('fi_custo').value||0,
    estoque:+document.getElementById('fi_estoque').value||0,
    estoque_min:+document.getElementById('fi_min').value||0,
    qtd_por_embalagem:emb?(+document.getElementById('fi_qtd_emb').value||1):null,
    unidade_uso:emb?document.getElementById('fi_unidade_uso').value.trim():null
  };
  S.insumos=S.insumos.filter(i=>i.id!==id); S.insumos.push(obj);
  lsSave('insumos',S.insumos); await cloudUpsert('insumos',obj);
  fecharModalInsumo(); renderTbodyInsumos(); showToast('Insumo salvo ✓');
}
async function deletarInsumo(id){
  if(!confirm('Excluir insumo?')) return;
  S.insumos=S.insumos.filter(i=>i.id!==id); lsSave('insumos',S.insumos);
  await cloudDelete('insumos',id); renderTbodyInsumos(); showToast('Insumo excluído');
}
function alertarWhatsApp(){
  const baixos=S.insumos.filter(i=>(+i.estoque||0)<=(+i.estoque_min||0)&&(+i.estoque_min||0)>0);
  if(!baixos.length) return showToast('Nenhum insumo em alerta de estoque','warn');
  const msg=`⚠️ *Alerta de Estoque — Clínica Dra Mariana*\n\n`+baixos.map(i=>`• *${i.nome}*: ${i.estoque||0} ${i.unidade||'un'} (mín: ${i.estoque_min})`).join('\n')+`\n\n_Sistema de Gestão Financeira_`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,'_blank');
}
function abrirModalCompra(){ document.getElementById('modalCompra').classList.remove('hidden'); }
function fecharModalCompra(){ document.getElementById('modalCompra').classList.add('hidden'); }
async function salvarCompra(){
  const data=document.getElementById('fc_data').value;
  const insumoId=document.getElementById('fc_insumo').value;
  const qtd=+document.getElementById('fc_qtd').value||0;
  const valor=+document.getElementById('fc_valor').value||0;
  const parcelas=+document.getElementById('fc_parcelas')?.value||1;
  if(!data||!insumoId||!qtd) return showToast('Preencha todos os campos','error');
  const ins=S.insumos.find(i=>i.id===insumoId);
  const obj={id:uid(),data,insumo_id:insumoId,insumo_nome:ins?ins.nome:'',qtd,valor_total:valor,parcelas};
  S.compras.push(obj); lsSave('compras',S.compras); await cloudUpsert('compras_estoque',obj);
  if(ins){ ins.estoque=(+ins.estoque||0)+qtd; S.insumos=S.insumos.map(i=>i.id===ins.id?ins:i); lsSave('insumos',S.insumos); await cloudUpsert('insumos',ins); }
  // Gerar despesas para cada parcela
  const vParcela=valor/parcelas;
  for(let p=1;p<=parcelas;p++){
    const dp=new Date(data); dp.setMonth(dp.getMonth()+(p-1));
    const desp={id:uid(),data:dp.toISOString().slice(0,10),
      descricao:parcelas>1?`Compra parcelada: ${ins?.nome||''} (${p}/${parcelas})`:`Compra: ${ins?.nome||''}`,
      categoria:'Compra Estoque',valor:vParcela};
    S.despesas.push(desp); await cloudUpsert('despesas_variaveis',desp);
  }
  lsSave('despesas',S.despesas);
  fecharModalCompra(); renderTbodyInsumos(); renderListaCompras(); showToast('Compra registrada ✓');
}

// ══════════════════ INIT ══════════════════
(async function init(){
  try{
    const timeout=new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),5000));
    const {data:{session}}=await Promise.race([sb.auth.getSession(),timeout]);
    if(session?.user){
      S.user=session.user;
      loadLocalStorage();
      showApp();
      loadCloud();
    }
  }catch(e){}
})();
</script>
