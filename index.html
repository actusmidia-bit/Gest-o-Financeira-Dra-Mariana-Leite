function lsKey(t) { return `gf_${S.user.id.slice(0,8)}_${t}`; }

function calcCustoMinuto() {
  const totalFixo=S.fixos.reduce((s,f)=>s+(+f.valor||0),0);
  const min=(S.cfg.horas||139.41)*60;
  return min>0?totalFixo/min:0;
}

function calcDRE(mes) {
  const regs=S.regs.filter(r=>r.data&&r.data.startsWith(mes));
  const receita=regs.reduce((s,r)=>s+(+r.preco||0),0);
  const custoInsumos=regs.reduce((s,r)=>s+(+r.custo_insumos||0),0);
  const custoTempo=regs.reduce((s,r)=>s+(+r.custo_tempo||0),0);
  const lucroBruto=receita-custoInsumos-custoTempo;
  const totalFixo=S.fixos.reduce((s,f)=>s+(+f.valor||0),0);
  const totalDespesas=S.despesas.filter(d=>d.data&&d.data.startsWith(mes)).reduce((s,d)=>s+(+d.valor||0),0);
  const resultado=lucroBruto-totalFixo-totalDespesas;
  const margem=receita>0?(resultado/receita)*100:0;
  return {receita,custoInsumos,custoTempo,lucroBruto,totalFixo,totalDespesas,resultado,margem,atendimentos:regs.length};
}

function calcPreco(custoInsumos,minutos) {
  const cm=calcCustoMinuto();
  const custoTempo=cm*minutos;
  const custoTotal=custoInsumos+custoTempo;
  const cfg=S.cfg;
  const pI=+(cfg.imposto||6), pC=+(cfg.cartao||3.5), pL=+(cfg.lucro||30);
  const divisor=1-(pI+pC+pL)/100;
  const preco=divisor>0?custoTotal/divisor:custoTotal*2;
  return {custoInsumos,custoTempo,custoTotal,preco,pctImposto:pI,pctCartao:pC,pctLucro:pL,
    vlrImposto:preco*(pI/100),vlrCartao:preco*(pC/100),vlrLucro:preco*(pL/100)};
}

function escHtml(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

    ${meta.faturamento>0||meta.atendimentos>0?`
    <div class="card">
      <div class="text-sm font-semibold text-gray-700 mb-3">🎯 Metas do Mês</div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <div class="flex justify-between text-xs mb-1"><span>Faturamento</span><span class="font-bold">${fmtBRL(dre.receita)} / ${fmtBRL(meta.faturamento)}</span></div>

          <div class="text-xs text-right mt-1 ${pctF>=100?'text-green-600':'text-gray-500'}">${pctF.toFixed(0)}% ${pctF>=100?'✓':''}</div>
        </div>
        <div>
          <div class="flex justify-between text-xs mb-1"><span>Atendimentos</span><span class="font-bold">${dre.atendimentos} / ${meta.atendimentos}</span></div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pctA}%;background:${pctA>=100?'#10b981':'#e11d48'}"></div></div>
          <div class="text-xs text-right mt-1 ${pctA>=100?'text-green-600':'text-gray-500'}">${pctA.toFixed(0)}% ${pctA>=100?'✓':''}</div>
        </div>
      </div>
    </div>`:''}
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
      <div class="metric-card">
        <div class="text-xs text-gray-500 mb-1">Receita Bruta ${tip('Soma de todos os atendimentos do mês')}</div>
        <div class="text-lg font-bold text-gray-800">${fmtBRL(dre.receita)}</div>
        <div class="text-xs ${diffRec===null?'text-gray-400':diffRec>=0?'text-green-500':'text-red-500'}">${dre.atendimentos} atend. ${diffRec!==null?`· ${diffRec>=0?'▲':'▼'} ${Math.abs(diffRec).toFixed(0)}% vs mês ant.`:''}</div>
      </div>
      <div class="metric-card" style="border-left-color:#10b981">

        <div class="text-xs text-gray-400">${fmtPct(dre.receita>0?(dre.lucroBruto/dre.receita)*100:0)} da receita</div>

      ${recPendentes.map(r=>`<div class="text-sm text-red-600 mb-1">💰 Recebimento vencido: <strong>${escHtml(r.descricao)}</strong> — ${fmtBRL(r.valor)} (previsto ${r.data_prevista})</div>`).join('')}
    </div>`:''}
    <div class="card">
      <div class="section-title">🧮 Simulador de Cenário</div>

          <label class="text-xs text-gray-500">Se eu fizer <strong id="simQtdLabel">0</strong> atendimentos/mês</label>
          <input type="range" id="simQtd" min="0" max="120" value="${dre.atendimentos||0}" class="w-full mt-2" oninput="atualizarSimCenario(${dre.totalFixo},${dre.totalDespesas},${ticketMedioGeral||0})">
        </div>
        <div id="simResultado" class="text-sm space-y-1"></div>
      </div>
    </div>
    <div class="card">
      <div class="section-title">📈 Evolução 6 Meses</div>
      <canvas id="grafico" height="120"></canvas>
    </div>
  </div>`;
  renderGrafico();
  atualizarSimCenario(dre.totalFixo, dre.totalDespesas, ticketMedioGeral||0);
}

function atualizarSimCenario(totalFixo, totalDespesas, ticket) {
  const qtd=+(document.getElementById('simQtd')||{value:0}).value||0;
  document.getElementById('simQtdLabel').textContent=qtd;
  const receita=ticket*qtd;
  const resultado=receita-totalFixo-totalDespesas;
  const el=document.getElementById('simResultado'); if(!el) return;
  el.innerHTML=`
    <div class="flex justify-between"><span class="text-gray-500">Receita estimada:</span><span class="font-semibold">${fmtBRL(receita)}</span></div>
    <div class="flex justify-between"><span class="text-gray-500">Custos totais:</span><span class="text-red-500">${fmtBRL(totalFixo+totalDespesas)}</span></div>
    <div class="flex justify-between border-t pt-1 font-bold ${resultado>=0?'text-green-600':'text-red-600'}">
      <span>Resultado:</span><span>${fmtBRL(resultado)}</span>
    </div>
    <div class="text-xs ${resultado>=0?'text-green-500':'text-orange-500'}">${resultado>=0?'✓ Lucrativo neste cenário':'⚠ Ainda no prejuízo'}</div>`;
}

function renderGrafico() {
  if(chartInstance){ chartInstance.destroy(); chartInstance=null; }
  const meses=[];
  for(let i=5;i>=0;i--){ const d=new Date(); d.setMonth(d.getMonth()-i); meses.push(d.toISOString().slice(0,7)); }
  const labels=meses.map(m=>new Date(m+'-02').toLocaleDateString('pt-BR',{month:'short',year:'2-digit'}));
  const receitas=meses.map(m=>calcDRE(m).receita);
  const resultados=meses.map(m=>calcDRE(m).resultado);
  const ctx=document.getElementById('grafico');
  if(!ctx) return;
  chartInstance=new Chart(ctx,{type:'bar',data:{labels,datasets:[
    {label:'Receita',data:receitas,backgroundColor:'#fecdd3',borderColor:'#e11d48',borderWidth:2,borderRadius:6},
    {label:'Resultado',data:resultados,type:'line',backgroundColor:'#bbf7d0',borderColor:'#10b981',borderWidth:2,yAxisID:'y1',tension:.3,pointRadius:4}
  ]},options:{responsive:true,plugins:{legend:{position:'top'}},
    scales:{y:{ticks:{callback:v=>'R$'+v.toLocaleString('pt-BR')}},y1:{position:'right',grid:{display:false},ticks:{callback:v=>'R$'+v.toLocaleString('pt-BR')}}}}});
}

function renderListaProcs() {
  const el=document.getElementById('listaProcs');
  if(!el) return;
  if(!S.procs.length){ el.innerHTML='<div class="text-center text-gray-400 py-8">Nenhum procedimento cadastrado</div>'; return; }
  // ordenar por margem de lucro desc
  const procsOrdenados=[...S.procs].sort((a,b)=>{
    const mA=+a.preco>0?(+a.preco-calcPreco(0,0).custoTotal)/+a.preco*100:0;
    const calcA=calcPreco(a.ficha?.reduce((s,f)=>{const ins=S.insumos.find(i=>i.id===f.insumo_id);return s+(ins?(+ins.custo||0)*(+f.qtd||0):0);},0)||0,+a.tempo||0);
    const calcB=calcPreco(b.ficha?.reduce((s,f)=>{const ins=S.insumos.find(i=>i.id===f.insumo_id);return s+(ins?(+ins.custo||0)*(+f.qtd||0):0);},0)||0,+b.tempo||0);
    const lucroA=+a.preco-calcA.custoTotal; const lucroB=+b.preco-calcB.custoTotal;
    return lucroB-lucroA;
  });
  el.innerHTML=procsOrdenados.map((p,idx)=>{
    const ficha=Array.isArray(p.ficha)?p.ficha:[];
    const custoIns=ficha.reduce((s,f)=>{ const ins=S.insumos.find(i=>i.id===f.insumo_id); return s+(ins?(+ins.custo||0)*(+f.qtd||0):0); },0);
    const calc=calcPreco(custoIns,+p.tempo||0);
    const preco=+p.preco||0;
    const diff=preco-calc.preco;
    const pctCustoIns=calc.preco>0?(calc.custoInsumos/calc.preco)*100:0;
    const pctCustoTempo=calc.preco>0?(calc.custoTempo/calc.preco)*100:0;
    return `<div class="card">
      <div class="flex items-start justify-between gap-3">
        <div class="flex-1">
          <div class="font-semibold text-gray-800 flex items-center gap-2">
            ${idx===0?'🥇':idx===1?'🥈':idx===2?'🥉':''}
            ${escHtml(p.nome)}
          </div>
          <div class="text-xs text-gray-500">${p.tempo||0} min</div>
        </div>
        <div class="text-right flex-shrink-0">
          <div class="font-bold text-gray-800">${fmtBRL(preco)}</div>
          <div class="text-xs ${diff<0?'text-red-500':'text-green-600'}">${diff<0?'⚠':'✓'} sugerido ${fmtBRL(calc.preco)}</div>
        </div>
        <div class="flex gap-1 no-print">
          <button onclick="abrirModalProc('${p.id}')" class="btn btn-sm btn-secondary">✏</button>
          <button onclick="deletarProc('${p.id}')" class="btn btn-sm btn-danger">🗑</button>
        </div>
      </div>
      <div class="mt-3 bg-gray-50 rounded-xl p-3 grid grid-cols-2 gap-x-4 gap-y-1 text-xs">
        <div class="flex justify-between"><span class="text-gray-500">Custo Insumos</span><span><strong>${fmtBRL(calc.custoInsumos)}</strong> <span class="text-gray-400">${fmtPct(pctCustoIns)}</span></span></div>
        <div class="flex justify-between"><span class="text-gray-500">Custo Tempo ${tip(`Custo/Min ${fmtBRL(calcCustoMinuto())} × ${p.tempo||0}min`)}</span><span><strong>${fmtBRL(calc.custoTempo)}</strong> <span class="text-gray-400">${fmtPct(pctCustoTempo)}</span></span></div>
        <div class="flex justify-between"><span class="text-gray-500">Impostos (${fmtPct(calc.pctImposto)})</span><span>${fmtBRL(calc.vlrImposto)}</span></div>
        <div class="flex justify-between"><span class="text-gray-500">Taxa Cartão (${fmtPct(calc.pctCartao)})</span><span>${fmtBRL(calc.vlrCartao)}</span></div>
        <div class="col-span-2 border-t pt-1 flex justify-between font-semibold text-green-700">
          <span>Lucro Líquido (${fmtPct(calc.pctLucro)}) ${tip('Percentual do preço final que representa lucro líquido após todos os custos e tributos')}</span>
          <span>${fmtBRL(calc.vlrLucro)}</span>
        </div>
        <div class="col-span-2 border-t pt-1 flex justify-between font-bold text-rose-700">
          <span>💡 Preço Sugerido</span><span>${fmtBRL(calc.preco)}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

let editingProcId=null, fichaTemp=[];

function adicionarFichaItem(){ fichaTemp.push({insumo_id:'',qtd:0}); renderFichaLista(); }
function atualizarSim() {
  const el=document.getElementById('simPreco'); if(!el) return;
  const tempo=+(document.getElementById('fp_tempo')||{value:0}).value||0;
  const custoIns=fichaTemp.reduce((s,f)=>{ const ins=S.insumos.find(i=>i.id===f.insumo_id); return s+(ins?(+ins.custo||0)*(+f.qtd||0):0); },0);
  const c=calcPreco(custoIns,tempo);
  el.innerHTML=`<div class="font-semibold mb-2 text-gray-700">💡 Simulador de Preço</div>
    <div class="grid grid-cols-2 gap-x-4 gap-y-1">
      <span class="text-gray-500">Custo insumos:</span><span>${fmtBRL(c.custoInsumos)}</span>
      <span class="text-gray-500">Custo tempo (${tempo}min):</span><span>${fmtBRL(c.custoTempo)}</span>
      <span class="text-gray-500">Impostos (${fmtPct(c.pctImposto)}):</span><span>${fmtBRL(c.vlrImposto)}</span>
      <span class="text-gray-500">Taxa cartão (${fmtPct(c.pctCartao)}):</span><span>${fmtBRL(c.vlrCartao)}</span>
      <span class="text-gray-500">Lucro (${fmtPct(c.pctLucro)}):</span><span class="text-green-600 font-bold">${fmtBRL(c.vlrLucro)}</span>
      <span class="font-bold text-rose-700 border-t pt-1 col-span-1">Preço sugerido:</span><span class="font-bold text-rose-700 border-t pt-1">${fmtBRL(c.preco)}</span>
    </div>`;
}
async function salvarProc() {
  const nome=document.getElementById('fp_nome').value.trim();
  if(!nome) return showToast('Informe o nome','error');
  const id=editingProcId||uid();
  const obj={id,nome,tempo:+(document.getElementById('fp_tempo').value)||0,
    preco:+(document.getElementById('fp_preco').value)||0,
    ficha:fichaTemp.filter(f=>f.insumo_id)};
  S.procs=S.procs.filter(p=>p.id!==id); S.procs.push(obj);
  lsSave('procs',S.procs); await cloudUpsert('procedimentos',obj);
  fecharModalProc(); renderProcedimentos(); showToast('Procedimento salvo ✓');
}
async function deletarProc(id) {
  if(!confirm('Excluir procedimento?')) return;
  S.procs=S.procs.filter(p=>p.id!==id); lsSave('procs',S.procs);
  await cloudDelete('procedimentos',id); renderListaProcs(); showToast('Procedimento excluído');
}

function preencherAtendProc() {
  const pid=document.getElementById('fa_proc').value;

  document.getElementById('fa_preco').value=p.preco||'';
  const ficha=Array.isArray(p.ficha)?p.ficha:[];
  const custoIns=ficha.reduce((s,f)=>{ const ins=S.insumos.find(i=>i.id===f.insumo_id); return s+(ins?(+ins.custo||0)*(+f.qtd||0):0); },0);
  const cm=calcCustoMinuto(); const custoTempo=cm*(+p.tempo||0);
  const el=document.getElementById('resumoAtend'); el.classList.remove('hidden');
  el.innerHTML=`Custo insumos: ${fmtBRL(custoIns)} | Custo tempo: ${fmtBRL(custoTempo)} | Total custo: ${fmtBRL(custoIns+custoTempo)} | Lucro estimado: ${fmtBRL((+p.preco||0)-custoIns-custoTempo)}`;
}
function renderListaAtend() {
  const mes=(document.getElementById('filtroMesAtend')||{value:mesAtual()}).value||mesAtual();
  const regs=S.regs.filter(r=>r.data&&r.data.startsWith(mes)).sort((a,b)=>b.data>a.data?1:-1);
  const el=document.getElementById('listaAtend'); if(!el) return;
  const total=regs.reduce((s,r)=>s+(+r.preco||0),0);

    <td class="p-2 text-xs text-gray-500">${r.data}</td>
    <td class="p-2">${escHtml(r.proc_nome||'-')}</td>
    <td class="p-2 text-xs text-gray-500">${escHtml(r.paciente_nome||'-')}</td>
    <td class="p-2 text-center font-semibold">${fmtBRL(r.preco)}</td>

      <button onclick="editarAtend('${r.id}')" class="btn btn-sm btn-secondary">✏</button>
      <button onclick="deletarAtend('${r.id}')" class="btn btn-sm btn-danger">🗑</button>
    </td>

function abrirModalAtend(){ const m=document.getElementById('modalAtend'); m.dataset.editId=''; m.classList.remove('hidden'); }
function fecharModalAtend(){ document.getElementById('modalAtend').classList.add('hidden'); }
function editarAtend(id) {
  const r=S.regs.find(x=>x.id===id); if(!r) return;
  abrirModalAtend();
  setTimeout(()=>{
    document.getElementById('fa_data').value=r.data||'';
    const ps=document.getElementById('fa_paciente'); if(ps) ps.value=r.paciente_id||'';
    const pr=document.getElementById('fa_proc'); if(pr){ pr.value=r.proc_id||''; preencherAtendProc(); }
    document.getElementById('fa_preco').value=r.preco||'';
    const pg=document.getElementById('fa_pag'); if(pg) pg.value=r.pagamento||'Dinheiro';
    // store id to overwrite on save
    document.getElementById('modalAtend').dataset.editId=id;
  },50);
}
async function salvarAtend() {
  const data=document.getElementById('fa_data').value;
  const procId=document.getElementById('fa_proc').value;
  const pacId=document.getElementById('fa_paciente').value;
  const preco=+document.getElementById('fa_preco').value||0;
  const pagamento=document.getElementById('fa_pag').value;
  if(!data||!procId) return showToast('Informe data e procedimento','error');
  const proc=S.procs.find(p=>p.id===procId);
  const pac=S.pacientes.find(p=>p.id===pacId);
  const ficha=proc&&Array.isArray(proc.ficha)?proc.ficha:[];
  const custoInsumos=ficha.reduce((s,f)=>{ const ins=S.insumos.find(i=>i.id===f.insumo_id); return s+(ins?(+ins.custo||0)*(+f.qtd||0):0); },0);
  const cm=calcCustoMinuto(); const custoTempo=cm*(+(proc&&proc.tempo)||0);
  const parcelas=parseInt((pagamento.match(/(\d+)x/)||[0,1])[1])||1;
  const editId=document.getElementById('modalAtend').dataset.editId||'';
  if(editId){ S.regs=S.regs.filter(r=>r.id!==editId); S.recebimentos=S.recebimentos.filter(r=>r.reg_id!==editId); await cloudDelete('registros',editId); }
  document.getElementById('modalAtend').dataset.editId='';
  const id=editId||uid();
  const obj={id,data,proc_id:procId,proc_nome:proc?proc.nome:'',
    paciente_id:pacId||null,paciente_nome:pac?pac.nome:'',
    preco,pagamento,parcelas,custo_insumos:custoInsumos,custo_tempo:custoTempo};
  S.regs.push(obj); lsSave('regs',S.regs); await cloudUpsert('registros',obj);
  // validar estoque antes de baixar
  const alertasEstoque=[];
  for(const f of ficha){
    const ins=S.insumos.find(i=>i.id===f.insumo_id);
    if(ins&&(+ins.estoque||0)<(+f.qtd||0)) alertasEstoque.push(`${ins.nome}: tem ${ins.estoque} ${ins.unidade||'un'}, precisa ${f.qtd}`);
  }
  if(alertasEstoque.length>0&&!confirm(`⚠️ Estoque insuficiente:\n${alertasEstoque.join('\n')}\n\nRegistrar mesmo assim?`)) return;
  for(const f of ficha){
    const ins=S.insumos.find(i=>i.id===f.insumo_id);
    if(ins){ ins.estoque=Math.max(0,(+ins.estoque||0)-(+f.qtd||0)); S.insumos=S.insumos.map(i=>i.id===ins.id?ins:i); await cloudUpsert('insumos',ins); }
  }
  lsSave('insumos',S.insumos);
  const valorParcela=preco/parcelas;
  for(let p=1;p<=parcelas;p++){
    const dp=new Date(data); dp.setMonth(dp.getMonth()+(p-1));
    const recId=uid();
    const rec={id:recId,reg_id:id,descricao:`${proc?proc.nome:'Atend.'}${p>1?` (${p}/${parcelas})`:''}`,
      data_prevista:dp.toISOString().slice(0,10),data_recebido:parcelas===1?data:null,
      valor:valorParcela,status:parcelas===1?'recebido':'pendente',parcela:p,total_parcelas:parcelas};
    S.recebimentos.push(rec); await cloudUpsert('recebimentos',rec);
  }
  lsSave('recebimentos',S.recebimentos);
  fecharModalAtend(); renderListaAtend(); showToast('Atendimento registrado ✓');
}
async function deletarAtend(id) {
  if(!confirm('Excluir atendimento?')) return;
  S.regs=S.regs.filter(r=>r.id!==id);
  S.recebimentos=S.recebimentos.filter(r=>r.reg_id!==id);
  lsSave('regs',S.regs); lsSave('recebimentos',S.recebimentos);
  await cloudDelete('registros',id); renderListaAtend(); showToast('Atendimento excluído');
}

function showFinTab(tab) {

function renderFluxoCaixa(el) {
  const mes=mesAtual();
  el.innerHTML=`<div class="space-y-4">
    <div class="flex items-center gap-3 flex-wrap">
      <span class="font-medium text-gray-700">Fluxo de Caixa</span>
      <input type="month" id="mesFluxo" value="${mes}" class="inp" style="max-width:160px" onchange="atualizarFluxo()">
    </div>
    <div class="grid grid-cols-3 gap-3" id="fluxoCards"></div>
    <div class="card"><table class="w-full text-sm"><thead><tr class="table-header">
      <th class="p-2 text-left">Descrição</th><th class="p-2">Previsão</th><th class="p-2">Valor</th><th class="p-2">Status</th><th class="p-2 no-print">Ação</th>
    </tr></thead><tbody id="tbodyFluxo"></tbody></table></div>
  </div>`;
  atualizarFluxo();
}
function atualizarFluxo() {
  const mes=(document.getElementById('mesFluxo')||{value:mesAtual()}).value||mesAtual();
  const recs=S.recebimentos.filter(r=>r.data_prevista&&r.data_prevista.startsWith(mes));
  const recebido=recs.filter(r=>r.status==='recebido').reduce((s,r)=>s+(+r.valor||0),0);
  const pendente=recs.filter(r=>r.status==='pendente').reduce((s,r)=>s+(+r.valor||0),0);
  const vencido=recs.filter(r=>r.status==='pendente'&&r.data_prevista<today()).reduce((s,r)=>s+(+r.valor||0),0);
  const cards=document.getElementById('fluxoCards');
  if(cards) cards.innerHTML=`
    <div class="card border-l-4 border-green-400"><div class="text-xs text-gray-500">Recebido ${tip('Confirmados como recebidos')}</div><div class="text-lg font-bold text-green-600">${fmtBRL(recebido)}</div></div>
    <div class="card border-l-4 border-yellow-400"><div class="text-xs text-gray-500">A Receber</div><div class="text-lg font-bold text-yellow-600">${fmtBRL(pendente)}</div></div>
    <div class="card border-l-4 border-red-400"><div class="text-xs text-gray-500">Vencidos ${tip('Pendentes com data prevista já passada')}</div><div class="text-lg font-bold text-red-600">${fmtBRL(vencido)}</div></div>`;
  const tb=document.getElementById('tbodyFluxo'); if(!tb) return;
  const sorted=recs.sort((a,b)=>a.data_prevista>b.data_prevista?1:-1);
  if(!sorted.length){ tb.innerHTML=`<tr><td colspan="5" class="text-center py-4 text-gray-400">Nenhum lançamento</td></tr>`; return; }
  tb.innerHTML=sorted.map(r=>{
    const v=r.status==='pendente'&&r.data_prevista<today();
    return `<tr class="border-b hover:bg-gray-50">
      <td class="p-2">${escHtml(r.descricao||'-')}</td>

async function salvarMeta() {
  const mes=document.getElementById('fm_mes').value;
  const fat=+document.getElementById('fm_fat').value||0;
  const atend=+document.getElementById('fm_atend').value||0;
  if(!mes) return alert('Selecione o mês');
  const existing=S.metas.find(m=>m.mes===mes);
  const id=existing?existing.id:uid();
  const obj={id,mes,faturamento:fat,atendimentos:atend};
  S.metas=S.metas.filter(m=>m.id!==id); S.metas.push(obj);

}

  S.cfg={...S.cfg,horas:+document.getElementById('cfg_horas').value||139.41,imposto:+document.getElementById('cfg_imposto').value||6,cartao:+document.getElementById('cfg_cartao').value||3.5,lucro:+document.getElementById('cfg_lucro').value||30};
  lsSave('cfg',S.cfg);
  try{ await sb.from('config_clinica').upsert({...S.cfg,user_id:S.user.id,updated_at:new Date().toISOString()}); }catch(e){}
  document.getElementById('cfgMsg').classList.remove('hidden');
  setTimeout(()=>document.getElementById('cfgMsg')?.classList.add('hidden'),2000);
}
let editingFixoId=null;
function abrirModalFixo(id=null) {
  editingFixoId=id; const f=id?S.fixos.find(x=>x.id===id):null;
  document.getElementById('modalFixoTitle').textContent=id?'Editar Custo Fixo':'Novo Custo Fixo';
  document.getElementById('ff_desc').value=f?f.descricao:'';
  document.getElementById('ff_valor').value=f?f.valor:'';
  document.getElementById('modalFixo').classList.remove('hidden');
}
function fecharModalFixo(){ document.getElementById('modalFixo').classList.add('hidden'); }
async function salvarFixo() {
  const desc=document.getElementById('ff_desc').value.trim(); if(!desc) return alert('Informe a descrição');
  const id=editingFixoId||uid();
  const obj={id,descricao:desc,valor:+document.getElementById('ff_valor').value||0};
  S.fixos=S.fixos.filter(f=>f.id!==id); S.fixos.push(obj);
  lsSave('fixos',S.fixos); await cloudUpsert('custos_fixos',obj);
  fecharModalFixo(); renderListaFixos(); showToast('Custo fixo salvo ✓');
}
async function deletarFixo(id) {
  if(!confirm('Excluir custo fixo?')) return;
  S.fixos=S.fixos.filter(f=>f.id!==id); lsSave('fixos',S.fixos);
  await cloudDelete('custos_fixos',id); renderListaFixos(); showToast('Custo fixo excluído');
}

// ══════════════════ INIT ══════════════════
(async function init() {
  try {
    const timeout = new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),5000));
    const { data:{ session } } = await Promise.race([sb.auth.getSession(), timeout]);
    if(session?.user){ S.user=session.user; await loadAll(); showApp(); }
  } catch(e) {
    // session check failed or timed out — show login
  }
})();
</script>
